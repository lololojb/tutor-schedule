<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#f2f2f7">
<title>е®¶ж•ҷжҺ’иҜҫ</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect width='180' height='180' rx='40' fill='%23007AFF'/><text x='90' y='110' text-anchor='middle' font-size='80' fill='white'>рҹ“ҡ</text></svg>">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--blue:#007AFF;--red:#FF3B30;--orange:#FF9500;--green:#34C759;--bg:#f2f2f7;--card:#fff;--text:#1c1c1e;--sec:#8e8e93;--sep:#e5e5ea;--radius:12px;--safe-b:env(safe-area-inset-bottom,0px)}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);-webkit-tap-highlight-color:transparent;overflow:hidden;height:100vh;user-select:none;-webkit-user-select:none}
button{font:inherit;border:none;background:none;cursor:pointer;color:var(--blue)}
button:active{opacity:.7}
input,select,textarea{font:inherit;border:1px solid var(--sep);border-radius:8px;padding:10px 12px;width:100%;background:var(--card);outline:none;font-size:15px}
input:focus,select:focus,textarea:focus{border-color:var(--blue)}
input[type="number"]{-moz-appearance:textfield}
label{font-size:13px;color:var(--sec);display:block;margin-bottom:4px}
#app{display:flex;flex-direction:column;height:100vh}
#main{flex:1;overflow-y:auto;padding-bottom:8px;-webkit-overflow-scrolling:touch}
#tabbar{display:flex;background:var(--card);border-top:1px solid var(--sep);padding:6px 0 var(--safe-b);z-index:10}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;padding:4px 0;color:var(--sec);font-size:10px;transition:color .2s}
.tab.active{color:var(--blue)}
.tab svg{width:24px;height:24px;margin-bottom:2px}
.card{background:var(--card);border-radius:var(--radius);padding:16px;margin:8px 16px}
.date-strip{display:flex;overflow-x:auto;padding:8px 12px;gap:6px;scroll-snap-type:x proximity;-webkit-overflow-scrolling:touch}
.date-strip::-webkit-scrollbar{display:none}
.date-chip{flex:0 0 auto;width:50px;height:62px;border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:12px;color:var(--sec);background:var(--card);scroll-snap-align:center;transition:all .2s;box-shadow:0 1px 2px #00000008}
.date-chip.today{border:2px solid var(--blue)}
.date-chip.active{background:var(--blue);color:#fff;font-weight:600;box-shadow:0 2px 8px #007AFF40}
.date-chip .dow{font-size:11px}
.date-chip .day{font-size:17px;font-weight:500;margin-top:2px}
.lesson-card{background:var(--card);border-radius:var(--radius);margin:8px 16px;overflow:hidden}
.lesson-card .inner{padding:14px 16px;display:flex;gap:12px;transition:transform .25s}
.lesson-card .time-col{width:52px;text-align:center;flex-shrink:0}
.lesson-card .time-col .t1{font-weight:600;font-size:15px}
.lesson-card .time-col .t2{font-size:11px;color:var(--sec)}
.lesson-card .info-col{flex:1;min-width:0}
.lesson-card .info-col .nm{font-weight:600;font-size:16px}
.lesson-card .info-col .loc{font-size:13px;color:var(--sec);margin-top:2px}
.lesson-card .fee-col{text-align:right;flex-shrink:0}
.lesson-card .fee-col .fee{font-weight:600;font-size:15px;color:var(--sec)}
.badge{display:inline-block;font-size:11px;padding:2px 8px;border-radius:10px;font-weight:500}
.badge.scheduled{background:#007AFF18;color:var(--blue)}
.badge.completed{background:#34C75918;color:var(--green)}
.badge.leave{background:#FF950018;color:var(--orange)}
.badge.cancelled{background:#8e8e9318;color:var(--sec)}
.badge.adjusted{background:#FF950018;color:var(--orange);margin-left:4px}
.commute-bar{font-size:11px;padding:6px 12px;margin:0 12px;display:flex;align-items:center;gap:4px;border-radius:6px}
.commute-bar.error{background:#FF3B3010;color:var(--red)}
.commute-bar.info{background:#FF950010;color:var(--orange)}
.commute-bar.ok{background:#34C75910;color:var(--green)}
.week-grid{display:grid;grid-template-columns:40px repeat(7,1fr);gap:1px;background:var(--sep);font-size:11px;margin:0 8px}
.week-grid .cell{background:var(--card);min-height:30px;padding:2px}
.week-grid .cell.hd{text-align:center;font-weight:600;padding:6px 2px;font-size:11px}
.week-grid .cell.tm{text-align:right;color:var(--sec);padding:2px 3px;font-size:10px}
.week-grid .cell.busy{background:#007AFF10;border-left:2px solid var(--blue);font-size:10px;padding:2px 3px;overflow:hidden}
.week-grid .cell.today-col{background:var(--blue);color:#fff}
.student-row{display:flex;align-items:center;padding:14px 16px;gap:12px;border-bottom:1px solid var(--sep);cursor:pointer}
.student-row:active{background:#00000005}
.student-row .av{width:40px;height:40px;border-radius:20px;background:var(--blue);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:16px;flex-shrink:0}
.student-row .info{flex:1;min-width:0}
.student-row .info .nm{font-weight:500;font-size:15px}
.student-row .info .sub{font-size:13px;color:var(--sec);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sheet-overlay{position:fixed;inset:0;background:#00000040;z-index:100;display:flex;align-items:flex-end;animation:fadeIn .2s}
.sheet{background:var(--bg);width:100%;max-height:90vh;border-radius:16px 16px 0 0;overflow:hidden;display:flex;flex-direction:column;animation:slideUp .25s}
.sheet-header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;background:var(--card);border-bottom:1px solid var(--sep);flex-shrink:0}
.sheet-header h2{font-size:17px;font-weight:600}
.sheet-body{flex:1;overflow-y:auto;padding:16px;-webkit-overflow-scrolling:touch}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.btn{padding:10px 20px;border-radius:8px;font-weight:500;text-align:center;display:inline-block;font-size:15px}
.btn-primary{background:var(--blue);color:#fff}
.btn-danger{background:var(--red);color:#fff}
.btn-ghost{color:var(--blue)}
.btn-sm{font-size:13px;padding:6px 12px}
.btn-block{display:block;width:100%}
.btn-group{display:flex;gap:8px}
.btn-group>*{flex:1}
.form-sect{margin-bottom:20px}
.form-sect h3{font-size:15px;font-weight:600;margin-bottom:10px}
.form-row{display:flex;gap:8px;align-items:center}
.form-row>*{flex:1}
.form-row.fixed>*{flex:none}
.summary-cards{display:flex;gap:12px;padding:0 16px;margin:12px 0}
.summary-card{flex:1;background:var(--card);border-radius:var(--radius);padding:14px}
.summary-card .t{font-size:12px;color:var(--sec)}
.summary-card .v{font-size:24px;font-weight:700;margin-top:4px}
.summary-card .v.blue{color:var(--blue)}
.summary-card .v.green{color:var(--green)}
.toast{position:fixed;top:60px;left:50%;transform:translateX(-50%);background:#1c1c1e;color:#fff;padding:10px 20px;border-radius:20px;font-size:14px;z-index:200;animation:toastIn .3s;pointer-events:none}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(-10px)}}
.segmented{display:flex;background:var(--sep);border-radius:8px;padding:2px}
.segmented button{flex:1;padding:6px 12px;border-radius:6px;font-size:13px;color:var(--text);font-weight:500}
.segmented button.active{background:var(--card);box-shadow:0 1px 3px #00000010}
.empty{text-align:center;padding:40px 20px;color:var(--sec)}
.empty .title{font-size:16px;font-weight:600;margin-bottom:4px;color:var(--text)}
.empty .sub{font-size:14px}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid var(--sep);border-top-color:var(--blue);border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.sch-chip{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;background:#007AFF10;color:var(--blue);border-radius:12px;font-size:12px;margin:2px 4px 2px 0}
.sch-chip .del{font-size:14px;cursor:pointer;opacity:.6}
.sch-chip .del:hover{opacity:1}
.commute-auto{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--green);margin-top:4px}
.filter-pill{padding:5px 12px;border-radius:14px;font-size:13px;background:var(--card);color:var(--sec);border:1px solid transparent}
.filter-pill.active{background:#007AFF12;color:var(--blue);border-color:var(--blue)}
</style>
</head>
<body>
<div id="app"><div id="main"></div><div id="tabbar"></div></div>
<div id="sheet-container"></div>
<div id="toast-container"></div>
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
<script>
// ==================== DATA STORE ====================
const Store=(()=>{
  let mem={},useMem=false;
  try{localStorage.setItem('_test','1');localStorage.removeItem('_test')}catch(e){useMem=true}
  return {
  get(k){try{if(useMem)return mem[k]||null;return JSON.parse(localStorage.getItem('ts_'+k))}catch(e){return mem[k]||null}},
  set(k,v){mem[k]=v;try{if(!useMem)localStorage.setItem('ts_'+k,JSON.stringify(v))}catch(e){useMem=true}},
  uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,8)},
  campuses(){return this.get('campuses')||[]},
  saveCampuses(v){this.set('campuses',v)},
  students(){return this.get('students')||[]},
  saveStudents(v){this.set('students',v)},
  lessons(){return this.get('lessons')||[]},
  saveLessons(v){this.set('lessons',v)},
  // Course type defaults
  courseTypes(){return this.get('courseTypes')||{private:100,institution:80,practice:75}},
  saveCourseTypes(v){this.set('courseTypes',v)},
  getCourseFee(type){const types=this.courseTypes();return types[type]||100;},
  // Map cache
  geocode(k){return this.get('geo_'+k)},
  setGeocode(k,v){this.set('geo_'+k,v)},
  route(k){return this.get('route_'+k)},
  setRoute(k,v){this.set('route_'+k,v)},
};})();

// ==================== HELPERS ====================
const fmt={
  time(h,m){return String(h).padStart(2,'0')+':'+String(m).padStart(2,'0')},
  date(d){const dd=new Date(d);return`${dd.getMonth()+1}/${dd.getDate()}`},
  weekday(d){return['ж—Ҙ','дёҖ','дәҢ','дёү','еӣӣ','дә”','е…ӯ'][new Date(d).getDay()]},
  dateFull(d){return this.date(d)+' е‘Ё'+this.weekday(d)},
  month(d){const dd=new Date(d);return`${dd.getFullYear()}е№ҙ${dd.getMonth()+1}жңҲ`},
  now(){const d=new Date();return`${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`},
};
const C={
  today(){const d=new Date();d.setHours(0,0,0,0);return d},
  dayStart(d){const r=new Date(d);r.setHours(0,0,0,0);return r},
  addDays(d,n){const r=new Date(d);r.setDate(r.getDate()+n);return r},
  sameDay(a,b){return new Date(a).toDateString()===new Date(b).toDateString()},
  weekStart(d){const r=new Date(d);r.setDate(r.getDate()-(r.getDay()+6)%7);r.setHours(0,0,0,0);return r},
  monday(d){const day=d.getDay();const diff=day===0?-6:1-day;const r=new Date(d);r.setDate(r.getDate()+diff);r.setHours(0,0,0,0);return r},
};

Date.prototype.toDateStr=function(){return`${this.getFullYear()}-${String(this.getMonth()+1).padStart(2,'0')}-${String(this.getDate()).padStart(2,'0')}`;};
const COURSE_TYPES={private:'е®¶ж•ҷиҜҫ',institution:'жңәжһ„иҜҫ',practice:'йҷӘз»ғиҜҫ'};
function courseTypeName(t){return COURSE_TYPES[t]||'е®¶ж•ҷиҜҫ';}

// ==================== MAP / COMMUTE ====================
function openGaodeNav(loc,campusId){
  const campuses=Store.campuses();const c=campuses.find(x=>x.id===campusId);
  const coords=c?.coords;const fullAddr=c?.address||loc;
  if(coords){
    window.open(`https://uri.amap.com/navigation?to=${coords.lng},${coords.lat},${encodeURIComponent(c.name)}&mode=transit`,'_blank');
  }else if(fullAddr){
    window.open(`https://uri.amap.com/search?keyword=${encodeURIComponent('ж·ұеңі'+fullAddr)}`,'_blank');
  }else{
    window.open(`https://uri.amap.com/search?keyword=${encodeURIComponent('ж·ұеңі'+loc)}`,'_blank');
  }
}

async function geocodeAddr(addr){
  if(!addr) return null;
  const fullAddr=addr.includes('ж·ұеңі')?addr:'ж·ұеңі'+addr;
  const cached=Store.geocode(fullAddr);
  if(cached) return cached;
  try{
    const resp=await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(addr)}&limit=1`);
    const data=await resp.json();
    if(data.length>0){
      const r={lat:parseFloat(data[0].lat),lng:parseFloat(data[0].lon)};
      Store.setGeocode(addr,r);
      return r;
    }
  }catch(e){console.warn('Geocode fail:',e)}
  return null;
}

async function calcCommute(fromAddr,toAddr){
  if(!fromAddr||!toAddr||fromAddr===toAddr) return 0;
  const key=`${fromAddr}|${toAddr}`;
  const cached=Store.route(key);
  if(cached!==null) return cached;

  const from=await geocodeAddr(fromAddr);
  const to=await geocodeAddr(toAddr);
  if(!from||!to) return 0;

  try{
    const url=`https://router.project-osrm.org/route/v1/driving/${from.lng},${from.lat};${to.lng},${to.lat}?overview=false`;
    const resp=await fetch(url);
    const data=await resp.json();
    if(data.routes&&data.routes.length>0){
      const mins=Math.round(data.routes[0].duration/60);
      Store.setRoute(key,mins);
      return mins;
    }
  }catch(e){console.warn('Route fail:',e)}
  return 0;
}

async function calcAllCommutes(lessons){
  const campuses=Store.campuses();
  const results={};
  for(let i=0;i<lessons.length-1;i++){
    const a=lessons[i], b=lessons[i+1];
    const cA=campuses.find(c=>c.id===a.campusId);
    const cB=campuses.find(c=>c.id===b.campusId);
    let fromAddr=cA?.address||a.location;if(fromAddr&&!fromAddr.includes('ж·ұеңі'))fromAddr='ж·ұеңі'+fromAddr;
    let toAddr=cB?.address||b.location;if(toAddr&&!toAddr.includes('ж·ұеңі'))toAddr='ж·ұеңі'+toAddr;
    if(fromAddr&&toAddr&&(cA?.id!==cB?.id||!cA)){
      results[i]=await calcCommute(fromAddr,toAddr);
    }
  }
  return results;
}

// ==================== LESSON GENERATION ====================
function generateLessons(){
  const today=C.today();
  const end=C.addDays(today,Store.get('weeks')||4*7);
  const students=Store.students().filter(s=>s.isActive!==false);
  const existing=Store.lessons();

  students.forEach(stu=>{
    if(!stu.schedules||!stu.schedules.length) return;
    stu.schedules.forEach(sch=>{
      let cur=new Date(today);
      while(cur<=end){
        if(cur.getDay()===sch.weekday){
          const ds=cur.toDateStr();
          const exists=existing.some(l=>
            l.studentId===stu.id&&l.date===ds&&l.status!=='cancelled'&&l.status!=='leave'
          );
          if(!exists){
            existing.push({
              id:Store.uid(),studentId:stu.id,date:ds,
              startHour:sch.startHour,startMinute:sch.startMinute||0,
              endHour:sch.endHour,endMinute:sch.endMinute||0,
              location:sch.location||stu.defaultLocation||'',
              plannedFee:sch.fee||stu.defaultFee||0,
              campusId:sch.campusId||stu.defaultCampusId||null,
              actualFee:null,status:'scheduled',isAdjusted:false,notes:''
            });
          }
        }
        cur=C.addDays(cur,1);
      }
    });
  });
  // Remove lessons for deleted schedules that no longer match
  const cleaned=existing.filter(l=>{
    const stu=students.find(s=>s.id===l.studentId);
    if(!stu||!stu.schedules||!stu.schedules.length) return l.status!=='scheduled';
    const d=new Date(l.date);
    const wd=d.getDay();
    return stu.schedules.some(sch=>sch.weekday===wd)||l.status!=='scheduled';
  });
  Store.saveLessons(cleaned);
}

// ==================== RENDER ENGINE ====================
let currentTab='today',selectedDate=C.today(),dayWeekMode='day';

const $=s=>document.querySelector(s),$$=s=>document.querySelectorAll(s);

function render(){
  generateLessons();
  const m=$('#main');
  switch(currentTab){
    case'today':m.innerHTML=renderToday();break;
    case'students':m.innerHTML=renderStudents();break;
    case'finance':m.innerHTML=renderFinance();break;
    case'settings':m.innerHTML=renderSettings();break;
  }
  renderTabbar();bindEvents();
  if(currentTab==='today'&&dayWeekMode==='day') calcAndShowCommute();
}

function renderTabbar(){
  const tabs=[
    {id:'today',label:'д»Ҡж—Ҙ',icon:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>'},
    {id:'students',label:'еӯҰз”ҹ',icon:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M6 21v-2a4 4 0 014-4h4a4 4 0 014 4v2"/></svg>'},
    {id:'finance',label:'иҙўеҠЎ',icon:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="6" x2="12" y2="12"/><line x1="12" y1="12" x2="16" y2="14"/></svg>'},
    {id:'settings',label:'и®ҫзҪ®',icon:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2"/></svg>'},
  ];
  $('#tabbar').innerHTML=tabs.map(t=>
    `<div class="tab${currentTab===t.id?' active':''}" data-tab="${t.id}">${t.icon}<span>${t.label}</span></div>`
  ).join('');
}

// ==================== TODAY VIEW ====================
function renderToday(){
  const lessons=getDayLessons(selectedDate);
  let html='<div class="date-strip" id="date-strip">';
  for(let i=-3;i<11;i++){
    const d=C.addDays(C.today(),i);
    const cls=['date-chip'];
    if(C.sameDay(d,C.today()))cls.push('today');
    if(C.sameDay(d,selectedDate))cls.push('active');
    html+=`<div class="${cls.join(' ')}" data-date="${d.toISOString()}"><span class="dow">${i===0?'д»ҠеӨ©':['ж—Ҙ','дёҖ','дәҢ','дёү','еӣӣ','дә”','е…ӯ'][d.getDay()]}</span><span class="day">${d.getDate()}</span></div>`;
  }
  html+='</div>';

  html+=`<div style="display:flex;align-items:center;padding:8px 16px">
    <span style="font-weight:700;font-size:20px">${dateTitle(selectedDate)}</span><span style="flex:1"></span>
    <button class="btn btn-sm btn-primary" id="btn-add-lesson">+ иҜ•иҜҫ/еҠ иҜҫ</button>
    <div class="segmented" style="margin-left:6px"><button class="${dayWeekMode==='day'?'active':''}" data-mode="day">ж—Ҙ</button><button class="${dayWeekMode==='week'?'active':''}" data-mode="week">е‘Ё</button></div>
  </div>`;

  // Monthly summary bar (д»…еңЁж—Ҙи§ҶеӣҫжҳҫзӨә)
  if(dayWeekMode==='day'){
    const now=new Date();const ms=new Date(now.getFullYear(),now.getMonth(),1);
    const me=new Date(now.getFullYear(),now.getMonth()+1,1);
    const allLessons=Store.lessons();
    const monthDone=allLessons.filter(l=>l.date>=ms.toDateStr()&&l.date<me.toDateStr()&&l.status==='completed');
    const monthScheduled=allLessons.filter(l=>l.date>=ms.toDateStr()&&l.date<me.toDateStr()&&l.status==='scheduled');
    const monthIncome=monthDone.reduce((s,l)=>s+(l.actualFee||l.plannedFee||0),0);
    // Weekly stats
    const mon=C.monday(now);const monStr=mon.toDateStr();
    const weekDone=allLessons.filter(l=>l.date>=monStr&&l.date<me.toDateStr()&&l.status==='completed');
    html+=`<div class="summary-cards" style="margin-bottom:0">
      <div class="summary-card" style="padding:10px 14px"><div class="t">жң¬е‘Ёе·ІдёҠ</div><div class="v blue" style="font-size:20px">${weekDone.length}иҠӮ</div></div>
      <div class="summary-card" style="padding:10px 14px"><div class="t">жң¬жңҲе·ІдёҠ</div><div class="v blue" style="font-size:20px">${monthDone.length}иҠӮ</div></div>
      <div class="summary-card" style="padding:10px 14px"><div class="t">еҫ…дёҠиҜҫ</div><div class="v" style="font-size:20px;color:var(--orange)">${monthScheduled.length}иҠӮ</div></div>
      <div class="summary-card" style="padding:10px 14px"><div class="t">жң¬жңҲж”¶е…Ҙ</div><div class="v green" style="font-size:20px">ВҘ${monthIncome}</div></div>

function renderWeekView(){
  const ws=C.monday(selectedDate);
  const lessons=Store.lessons().filter(l=>l.status!=='cancelled'&&l.status!=='leave');
  let html=`<div style="display:flex;align-items:center;padding:8px 16px;gap:8px">
    <span style="font-weight:600;font-size:14px">${fmt.date(ws)} - ${fmt.date(C.addDays(ws,6))}</span>
    <span style="flex:1"></span>
    <button class="btn btn-sm btn-primary" id="btn-export">рҹ“· еҜјеҮә</button>
  </div>`;

  html+='<div class="week-grid" id="week-grid">';
  html+='<div class="cell hd"></div>';
  const today=C.today();
  for(let d=0;d<7;d++){
    const date=C.addDays(ws,d);
    const isT=C.sameDay(date,today);
    html+=`<div class="cell hd${isT?' today-col':''}">${['дёҖ','дәҢ','дёү','еӣӣ','дә”','е…ӯ','ж—Ҙ'][d]}<br>${date.getDate()}</div>`;
  }
  for(let h=6;h<23;h++){
    html+=`<div class="cell tm">${String(h).padStart(2,'0')}:00</div>`;
    for(let d=0;d<7;d++){
      const date=C.addDays(ws,d);
      const ds=date.toDateStr();
      const cell=lessons.filter(l=>l.date===ds&&l.startHour<=h&&l.endHour>h);
      const isT=C.sameDay(date,today);
      if(cell.length>0){
        const l=cell[0];const stu=Store.students().find(s=>s.id===l.studentId);
        html+=`<div class="cell busy${isT?' today-col':''}">${stu?.name||''}</div>`;
      }else{html+=`<div class="cell${isT?' today-col':''}"></div>`;}
    }
  }
  html+='</div>';
  return html;
}

async function calcAndShowCommute(){
  const lessons=getDayLessons(selectedDate);
  if(lessons.length<2) return;
  const commutes=await calcAllCommutes(lessons);
  $$('[data-commute]').forEach(el=>{
    const i=parseInt(el.dataset.commute);
    const a=lessons[i],b=lessons[i+1];
    const gap=(b.startHour*60+b.startMinute)-(a.endHour*60+a.endMinute);
    const commuteNeed=commutes[i]||0;
    el.style.display='flex';
    const metroNeed=Math.round(commuteNeed*1.1); // ең°й“ҒвүҲй©ҫиҪҰж—¶й—ҙпјҢз•ҘеҠ жҚўд№ҳ
    if(commuteNeed===0){
      el.className='commute-bar ok';
      el.textContent=`рҹ“Қ еҗҢеҢәеҹҹ В· й—ҙйҡ”${gap}еҲҶй’ҹ`;
    }else if(commuteNeed>gap){
      el.className='commute-bar error';
      el.textContent=`рҹҡҮ ең°й“ҒзәҰ${metroNeed}min вүҘ й—ҙйҡ”${gap}minпјҢжқҘдёҚеҸҠпјҒзӮ№ең°зӮ№жҚўеҜјиҲӘзңӢи·Ҝзәҝ`;
    }else if(metroNeed>gap){
      el.className='commute-bar info';
      el.textContent=`рҹҡҮ ең°й“ҒзәҰ${metroNeed}minпјҢй—ҙйҡ”д»…${gap}minпјҢе»әи®®${fmt.time(b.startHour,b.startMinute-metroNeed)}еүҚеҮәеҸ‘`;
    }else if(gap-commuteNeed<15){
      el.className='commute-bar info';
      el.textContent=`рҹҡҮ ең°й“ҒзәҰ${metroNeed}min В· й—ҙйҡ”${gap}min В· е»әи®®${fmt.time(b.startHour,b.startMinute-metroNeed)}еҮәеҸ‘`;
    }else{
      el.className='commute-bar ok';
      el.textContent=`рҹҡҮ ең°й“ҒзәҰ${metroNeed}min В· й—ҙйҡ”${gap}min В· дҪҷ${gap-metroNeed}min`;
    }
  });
}

    if(result.students.length===0){toast('жңӘиғҪиҜҶеҲ«д»»дҪ•иҜҫзЁӢпјҢиҜ·жЈҖжҹҘж јејҸ');return false;}
    // Merge into existing data (preserve user customizations)

    const existingLessons=Store.lessons();
    result.students.forEach(newStu=>{
      const exist=existingStudents.find(s=>s.name===newStu.name);
      if(exist){
        // Only add NEW schedules (keep existing ones)
        const oldSchs=exist.schedules||[];
        (newStu.schedules||[]).forEach(ns=>{
          const dup=oldSchs.find(s=>s.weekday===ns.weekday&&s.startHour===ns.startHour&&s.startMinute===ns.startMinute);
          if(dup){
            // Update existing schedule with new location if import has it
            if(ns.location) dup.location=ns.location;
          }else{
            oldSchs.push(ns);
          }
        });
        exist.schedules=oldSchs;
        // Restore notes from import if they have useful info (иҜ·еҒҮ/еҒңиҜҫ/жңӘе®ҡзӯү)
        if(newStu.notes&&exist.notes!==newStu.notes&&/иҜ·еҒҮ|еҒңиҜҫ|жңӘе®ҡ|дёӨе‘ЁдёҖиҠӮ/.test(newStu.notes)){
          exist.notes=(exist.notes?exist.notes+'пјӣ':'')+newStu.notes;
        }
        if(newStu.parentContact&&!exist.parentContact) exist.parentContact=newStu.parentContact;
        if(newStu.defaultLocation&&!exist.defaultLocation) exist.defaultLocation=newStu.defaultLocation;
        // NEVER overwrite: courseType, defaultFee, defaultCampusId, isActive
      }else{
        existingStudents.push(newStu);
      }
    });
    Store.saveStudents(existingStudents);
    // Update existing future lessons with locations from import
    const todayStr=C.today().toDateStr();
    existingLessons.forEach(l=>{
      if(l.date>=todayStr&&l.status==='scheduled'&&!l.location){
        const stu=existingStudents.find(s=>s.id===l.studentId);
        if(stu&&stu.schedules){
          const d=new Date(l.date);
          const sch=stu.schedules.find(s=>s.weekday===d.getDay()&&s.startHour===l.startHour&&s.startMinute===l.startMinute);
          if(sch&&sch.location) l.location=sch.location;
        }
      }
    });
    result.lessons.forEach(newL=>{
      const stu=existingStudents.find(s=>s.name===newL.studentName);
      if(!stu) return;
      const exists=existingLessons.some(l=>l.studentId===stu.id&&l.date===newL.date&&l.status!=='cancelled'&&l.status!=='leave');
      if(!exists){
        existingLessons.push({...newL,studentId:stu.id});
      }
    });
    Store.saveLessons(existingLessons);
    generateLessons();
    toast(`еҜје…ҘжҲҗеҠҹпјҡ${result.students.length}дёӘеӯҰз”ҹпјҢ${result.lessons.length}иҠӮиҜҫ`);
    return true;
  });
}

function parseSchedule(text){
  const students=[],lessons=[];
  let currentWeekday=-1;
  const lines=text.split('\n');
  const wdMap={'дёҖ':1,'дәҢ':2,'дёү':3,'еӣӣ':4,'дә”':5,'е…ӯ':6,'ж—Ҙ':0,'еӨ©':0};

  lines.forEach(line=>{
    line=line.trim();
    if(!line) return;
    // Match weekday header: рҹ“… е‘ЁдёҖ, е‘ЁдёҖ, рҹ“… Monday etc
    const wdMatch=line.match(/е‘Ё\s*([дёҖдәҢдёүеӣӣдә”е…ӯж—ҘеӨ©])/);
    if(wdMatch){currentWeekday=wdMap[wdMatch[1]];return;}
    const engMatch=line.match(/monday|tuesday|wednesday|thursday|friday|saturday|sunday/i);
    if(engMatch){
      const map={sunday:0,monday:1,tuesday:2,wednesday:3,thursday:4,friday:5,saturday:6};
      currentWeekday=map[engMatch[0].toLowerCase()];
      return;
    }
    if(currentWeekday<0) return;

    // Skip non-lesson lines
    if(/дј‘жҒҜ|ж”ҫеҒҮ/.test(line)) return;

    // Match: й»Һеі»зқҝ 17:00-18:00 or в–«пёҸ й»Һеі»зқҝ 17:00-18:00 or - й»Һеі»зқҝ 17:00-18:00
    const content=line.replace(/^[в–«пёҸв–ӘвҖў\-\s]+|^\d+[\.гҖҒ]\s*/,'');
    const timeMatch=content.match(/(.+?)\s+(\d{1,2}):(\d{2})\s*[-вҖ“вҖ”~иҮі]\s*(\d{1,2}):(\d{2})(.*)/);
    if(!timeMatch) return;

    const name=timeMatch[1].trim();
    const sh=parseInt(timeMatch[2]),sm=parseInt(timeMatch[3]);
    const eh=parseInt(timeMatch[4]),em=parseInt(timeMatch[5]);
    const extra=timeMatch[6].trim();

    // Parse: "ең°зӮ№ (еӨҮжіЁ)" or "ең°зӮ№" or "ең°зӮ№(еӨҮжіЁ)"
    let location='',note='';
    const noteIdx=extra.search(/[\(пјҲ]/);
    if(noteIdx>0){
      location=extra.substring(0,noteIdx).trim();
      note=extra.substring(noteIdx).replace(/^[\(пјҲ]|[\)пјү]$/g,'').trim();
    }else if(noteIdx===0){
      note=extra.replace(/^[\(пјҲ]|[\)пјү]$/g,'').trim();
    }else{
      location=extra;
    }

    // Check for жҡӮж—¶еҒңиҜҫ / еҒңиҜҫ вҶ’ mark student inactive
    const isSuspended=/еҒңиҜҫ/.test(note);
    const isLeave=/иҜ·еҒҮ/.test(note);
    const isUncertain=/жңӘе®ҡ/.test(note);

    // Create student
    const existingStu=students.find(s=>s.name===name);
    if(!existingStu){
      students.push({
        id:Store.uid(),name,parentContact:'',courseType:'institution',defaultLocation:location,defaultFee:80,
        defaultCampusId:null,isActive:!isSuspended,notes:note,
        schedules:isSuspended?[]:[{weekday:currentWeekday,startHour:sh,startMinute:sm,endHour:eh,endMinute:em,location,fee:80,campusId:null}]
      });
    }else{
      if(!existingStu.schedules) existingStu.schedules=[];
      // Update location if new one is more specific
      if(location&&(!existingStu.defaultLocation||existingStu.defaultLocation.length<location.length)){
        existingStu.defaultLocation=location;
      }
      // Update notes
      if(note&&!existingStu.notes) existingStu.notes=note;
      if(isSuspended) existingStu.isActive=false;
      // Add schedule for non-suspended lessons
      if(!isSuspended){
        const dup=existingStu.schedules.find(sc=>sc.weekday===currentWeekday&&sc.startHour===sh&&sc.startMinute===sm);
        if(!dup){
          existingStu.schedules.push({weekday:currentWeekday,startHour:sh,startMinute:sm,endHour:eh,endMinute:em,location,fee:80,campusId:null});
        }
      }
    }

    // Create lesson for next occurrence (skip for suspended/leave/uncertain)
    if(!isSuspended&&!isUncertain){
      const today=C.today();
      const targetDate=new Date(today);
      const currentDay=targetDate.getDay();
      let daysUntil=currentWeekday-currentDay;
      if(daysUntil<0) daysUntil+=7;
      if(daysUntil===0&&targetDate.getHours()>eh) daysUntil=7;
      targetDate.setDate(targetDate.getDate()+daysUntil);
      lessons.push({studentName:name,id:Store.uid(),date:targetDate.toDateStr(),startHour:sh,startMinute:sm,endHour:eh,endMinute:em,location,plannedFee:80,campusId:null,actualFee:null,status:'scheduled',isAdjusted:false,notes:note||''});
    }
  });

  return {students,lessons};
}

function showSheet(title,bodyHtml,onSave){
  const overlay=document.createElement('div');overlay.className='sheet-overlay';
  overlay.innerHTML=`<div class="sheet"><div class="sheet-header"><button class="btn-ghost" id="sheet-cancel">еҸ–ж¶Ҳ</button><h2>${title}</h2><button class="btn-ghost" style="font-weight:600" id="sheet-save">${onSave?'дҝқеӯҳ':'е…ій—ӯ'}</button></div><div class="sheet-body">${bodyHtml}</div></div>`;
  $('#sheet-container').appendChild(overlay);
  overlay.querySelector('#sheet-cancel').onclick=()=>closeSheet(overlay);
  overlay.querySelector('#sheet-save').onclick=()=>{if(onSave){if(onSave(overlay)===false)return;}closeSheet(overlay);};
  overlay.onclick=e=>{if(e.target===overlay)closeSheet(overlay);};
}
function closeSheet(overlay){overlay.style.opacity='0';setTimeout(()=>overlay.remove(),200);render();}

        <input data-sch-eh="${i}" type="number" value="11" min="6" max="22" style="width:42px;padding:4px">:
        <input data-sch-em="${i}" type="number" value="0" min="0" max="45" step="15" style="width:42px;padding:4px">
         ВҘ<input data-sch-fee="${i}" type="number" value="0" placeholder="й»ҳи®Ө" style="width:50px;padding:4px">
        <button data-del-sch="${i}" style="color:var(--red);font-size:18px">Г—</button>`;
      list.appendChild(div);
      div.querySelector('[data-del-sch]').onclick=()=>div.remove();
    };
    $$('#sch-list [data-del-sch]').forEach(b=>b.onclick=function(){this.closest('[class*=sch-chip]').remove();});
  },100);
}

function showLessonEdit(lesson){
  const l=lesson;const student=Store.students().find(s=>s.id===l.studentId);
  const body=`<div class="form-sect"><h3>иҜҫзЁӢ - ${student?.name||''}</h3>
    <label>ж—Ҙжңҹ</label><input id="ef-l-date" type="date" value="${l.date}">
    <div class="form-row" style="margin-top:8px"><div><label>ејҖе§Ӣ</label><div class="form-row fixed"><input id="ef-l-sh" type="number" value="${l.startHour}" min="6" max="22" style="width:55px;padding:6px"><span>:</span><input id="ef-l-sm" type="number" value="${l.startMinute||0}" min="0" max="45" step="15" style="width:55px;padding:6px"></div></div><div><label>з»“жқҹ</label><div class="form-row fixed"><input id="ef-l-eh" type="number" value="${l.endHour}" min="6" max="22" style="width:55px;padding:6px"><span>:</span><input id="ef-l-em" type="number" value="${l.endMinute||0}" min="0" max="45" step="15" style="width:55px;padding:6px"></div></div></div>
    <label style="margin-top:8px">ең°зӮ№</label><input id="ef-l-loc" value="${l.location||''}">
    <label style="margin-top:8px">иҜҫж—¶иҙ№</label><input id="ef-l-fee" type="number" value="${l.plannedFee||0}">
  </div>
  <div class="form-sect"><h3>зҠ¶жҖҒ</h3><select id="ef-l-status"><option value="scheduled" ${l.status==='scheduled'?'selected':''}>еҫ…дёҠиҜҫ</option><option value="completed" ${l.status==='completed'?'selected':''}>е·Іе®ҢжҲҗ</option><option value="leave" ${l.status==='leave'?'selected':''}>иҜ·еҒҮ</option><option value="cancelled" ${l.status==='cancelled'?'selected':''}>е·ІеҸ–ж¶Ҳ</option></select>
    <div id="ef-l-actual-group" style="${l.status==='completed'?'':'display:none'}"><label style="margin-top:8px">е®һж”¶йҮ‘йўқ</label><input id="ef-l-actual" type="number" value="${l.actualFee||l.plannedFee||0}"></div>
  </div>
  <div class="form-sect"><label><input type="checkbox" id="ef-l-permanent"> еҗҢжӯҘжӣҙж–°еӣәе®ҡжҺ’иҜҫ</label></div>
  <div class="form-sect"><label>еӨҮжіЁ</label><textarea id="ef-l-notes" rows="2">${l.notes||''}</textarea></div>`;
  showSheet('зј–иҫ‘иҜҫзЁӢ',body,overlay=>{
    const status=overlay.querySelector('#ef-l-status').value;
    const lessons=Store.lessons();const idx=lessons.findIndex(x=>x.id===l.id);
    if(idx<0)return true;
    lessons[idx].date=overlay.querySelector('#ef-l-date').value;lessons[idx].startHour=parseInt(overlay.querySelector('#ef-l-sh').value);lessons[idx].startMinute=parseInt(overlay.querySelector('#ef-l-sm').value);lessons[idx].endHour=parseInt(overlay.querySelector('#ef-l-eh').value);lessons[idx].endMinute=parseInt(overlay.querySelector('#ef-l-em').value);lessons[idx].location=overlay.querySelector('#ef-l-loc').value;lessons[idx].plannedFee=parseInt(overlay.querySelector('#ef-l-fee').value)||0;lessons[idx].status=status;lessons[idx].actualFee=status==='completed'?(parseInt(overlay.querySelector('#ef-l-actual').value)||null):null;lessons[idx].isAdjusted=true;lessons[idx].notes=overlay.querySelector('#ef-l-notes').value;
    if(overlay.querySelector('#ef-l-permanent').checked&&student){const d=new Date(lessons[idx].date);const wd=d.getDay();const hasSch=student.schedules?student.schedules.some(sc=>sc.weekday===wd):false;if(!hasSch&&!student.schedules)student.schedules=[];if(!hasSch)student.schedules.push({weekday:wd,startHour:lessons[idx].startHour,startMinute:lessons[idx].startMinute,endHour:lessons[idx].endHour,endMinute:lessons[idx].endMinute,location:lessons[idx].location,fee:lessons[idx].plannedFee,campusId:lessons[idx].campusId});student.defaultFee=lessons[idx].plannedFee;student.defaultLocation=lessons[idx].location;const students=Store.students();const si=students.findIndex(x=>x.id===student.id);if(si>=0)students[si]=student;Store.saveStudents(students);generateLessons();}
    Store.saveLessons(lessons);return true;
  });
  setTimeout(()=>{const st=overlay.querySelector('#ef-l-status');if(st)st.onchange=()=>{overlay.querySelector('#ef-l-actual-group').style.display=st.value==='completed'?'block':'none';};},100);
}

function showCampusEdit(campus){
  const c=campus||{};
  const body=`<div class="form-sect">
    <label>еҗҚз§°</label><input id="ef-c-name" value="${c.name||''}" placeholder="еҰӮпјҡжҖ»еә—гҖҒBеә§">
    <label style="margin-top:8px">ең°еқҖ</label><input id="ef-c-addr" value="${c.address||''}" placeholder="иҫ“е…Ҙең°еқҖеҗҺиҮӘеҠЁи®Ўз®—йҖҡеӢӨж—¶й—ҙ">
    <p class="form-hint">иҫ“е…ҘиҜҰз»Ҷең°еқҖеҗҺпјҢзі»з»ҹиҮӘеҠЁйҖҡиҝҮең°еӣҫи®Ўз®—ж ЎеҢәй—ҙзҡ„йҖҡеӢӨж—¶й—ҙпјҢж— йңҖжүӢеҠЁеЎ«еҶҷгҖӮ</p>
    ${c.coords?`<div class="commute-auto">вң… е·Іе®ҡдҪҚ (${c.coords.lat?.toFixed(4)}, ${c.coords.lng?.toFixed(4)})</div>`:''}
  </div>`;
  showSheet(c.id?'зј–иҫ‘ж ЎеҢә':'ж·»еҠ ж ЎеҢә',body,async overlay=>{
    const name=overlay.querySelector('#ef-c-name').value.trim();if(!name){toast('иҜ·иҫ“е…ҘеҗҚз§°');return false;}
    const addr=overlay.querySelector('#ef-c-addr').value.trim();
    let coords=null;
    if(addr){try{coords=await geocodeAddr(addr);}catch(e){}}
    const data={id:c.id||Store.uid(),name,address:addr,coords};
    const campuses=Store.campuses();const idx=campuses.findIndex(x=>x.id===data.id);
    if(idx>=0)campuses[idx]=data;else campuses.push(data);
    Store.saveCampuses(campuses);return true;
  });
}

  const nm=$('#btn-nm');if(nm)nm.onclick=()=>{financeMonth.setMonth(financeMonth.getMonth()+1);render();};
  const ac=$('#btn-add-campus');if(ac)ac.onclick=()=>showCampusEdit();
  const st=$('#btn-save-types');if(st)st.onclick=()=>{Store.saveCourseTypes({private:parseInt($('#set-fee-private').value)||100,institution:parseInt($('#set-fee-institution').value)||80,practice:parseInt($('#set-fee-practice').value)||75});toast('й»ҳи®Өд»·ж је·Ідҝқеӯҳ вң“');};
  $$('[data-edit-campus]').forEach(el=>{el.onclick=(e)=>{e.stopPropagation();const c=Store.campuses().find(x=>x.id===el.dataset.editCampus);if(c)showCampusEdit(c);};});
  $$('[data-del-campus]').forEach(el=>{el.onclick=(e)=>{e.stopPropagation();if(confirm('еҲ йҷӨиҜҘж ЎеҢәпјҹ')){Store.saveCampuses(Store.campuses().filter(x=>x.id!==el.dataset.delCampus));render();}};});
  const ib=$('#btn-import');if(ib)ib.onclick=showImport;
  const sb=$('#btn-sample');if(sb)sb.onclick=loadDemoData;
  const cb=$('#btn-clear');if(cb)cb.onclick=()=>{if(confirm('вҡ пёҸ жё…йҷӨе…ЁйғЁж•°жҚ®пјҹ')){if(confirm('жүҖжңүеӯҰз”ҹгҖҒжҺ’иҜҫгҖҒиҙўеҠЎи®°еҪ•е°Ҷж°ёд№…еҲ йҷӨпјҢж— жі•жҒўеӨҚгҖӮзЎ®и®Өпјҹ')){localStorage.clear();render();toast('е·Іжё…йҷӨе…ЁйғЁж•°жҚ®');}}};

// ==================== DOM FILTER ====================
function filterStudentDOM(){
  const q=studentFilter.toLowerCase();
  $$('.student-row').forEach(row=>{
    if(!q){row.style.display='';return;}
    row.style.display=(row.textContent||'').toLowerCase().includes(q)?'':'none';
  });
}

// ==================== UTILS ====================
function getDayLessons(date){const ds=date.toDateStr();return Store.lessons().filter(l=>l.date===ds&&l.status!=='cancelled'&&l.status!=='leave').sort((a,b)=>(a.startHour*60+a.startMinute)-(b.startHour*60+b.startMinute));}
function dateTitle(d){const today=C.today();if(C.sameDay(d,today))return'д»ҠеӨ©';if(C.sameDay(d,C.addDays(today,-1)))return'жҳЁеӨ©';if(C.sameDay(d,C.addDays(today,1)))return'жҳҺеӨ©';return`${d.getMonth()+1}жңҲ${d.getDate()}ж—Ҙ е‘Ё${fmt.weekday(d)}`;}
function toast(msg){const el=document.createElement('div');el.className='toast';el.textContent=msg;$('#toast-container').appendChild(el);setTimeout(()=>{el.style.opacity='0';setTimeout(()=>el.remove(),300);},2000);}
async function exportWeekImage(){const grid=$('#week-grid');if(!grid)return toast('иҜ·е…ҲеҲҮжҚўеҲ°е‘Ёи§Ҷеӣҫ');try{const canvas=await html2canvas(grid,{backgroundColor:'#ffffff',scale:2});const blob=await new Promise(r=>canvas.toBlob(r,'image/png'));if(navigator.share){const file=new File([blob],`иҜҫиЎЁ_${fmt.date(C.monday(selectedDate))}.png`,{type:'image/png'});await navigator.share({files:[file],title:'е‘ЁиҜҫиЎЁ'});}else{const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`иҜҫиЎЁ_${fmt.date(C.monday(selectedDate))}.png`;a.click();}toast('еҜјеҮәжҲҗеҠҹ вң“');}catch(e){toast('еҜјеҮәеӨұиҙҘ');}}

// ==================== INIT ====================
// ж•°жҚ®иҝҒз§»пјҡжЈҖжөӢж—§зүҲж јејҸе№¶жё…йҷӨ
const oldData=Store.get('students');
if(oldData&&oldData.length>0&&oldData[0].hasSchedule!==undefined&&!oldData[0].schedules){
  try{localStorage.clear()}catch(e){}
}
// иҮӘеҠЁдҝ®еӨҚж—§ж•°жҚ®дёӯзҡ„ ВҘ200 ејӮеёёд»·ж ј
const fixStudents=Store.students(),fixLessons=Store.lessons();
let fixedL=0,fixedS=0;
fixStudents.forEach(s=>{if(s.defaultFee>=200){s.defaultFee=80;fixedS++;}});
fixLessons.forEach(l=>{if(l.plannedFee>=200){const stu=fixStudents.find(s=>s.id===l.studentId);l.plannedFee=stu?.defaultFee||80;fixedL++;}});

// йҰ–ж¬ЎдҪҝз”ЁиҮӘеҠЁеј№еҮәеҜје…ҘзӘ—еҸЈ
if(!Store.campuses().length||!Store.students().length){
  setTimeout(()=>showImport(),500);
}
generateLessons();
// ж»ҡеҠЁеҲ°д»ҠеӨ©
setTimeout(()=>{
  const chips=$$('.date-chip');
  chips.forEach(c=>{if(c.classList.contains('today'))c.scrollIntoView({behavior:'smooth',inline:'center'});});
},300);
render();
if('serviceWorker'in navigator){navigator.serviceWorker.register('sw.js').catch(()=>{});}
