<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#f2f2f7">
<title>家教排课</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect width='180' height='180' rx='40' fill='%23007AFF'/><text x='90' y='110' text-anchor='middle' font-size='80' fill='white'>📚</text></svg>">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--blue:#007AFF;--red:#FF3B30;--orange:#FF9500;--green:#34C759;--bg:#f2f2f7;--card:#fff;--text:#1c1c1e;--sec:#8e8e93;--sep:#e5e5ea;--radius:12px;--safe-b:env(safe-area-inset-bottom,0px)}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);-webkit-tap-highlight-color:transparent;overflow:hidden;height:100vh;user-select:none;-webkit-user-select:none}
button{font:inherit;border:none;background:none;cursor:pointer;color:var(--blue)}
button:active{opacity:.7}
input,select,textarea{font:inherit;border:1px solid var(--sep);border-radius:8px;padding:10px 12px;width:100%;background:var(--card);outline:none;font-size:15px}
input:focus,select:focus,textarea:focus{border-color:var(--blue)}
input[type="number"]{-moz-appearance:textfield}
label{font-size:13px;color:var(--sec);display:block;margin-bottom:4px}
#app{display:flex;flex-direction:column;height:100vh;padding-top:env(safe-area-inset-top,0px)}
#main{flex:1;overflow-y:auto;padding-bottom:8px;-webkit-overflow-scrolling:touch}
#tabbar{display:flex;background:var(--card);border-top:1px solid var(--sep);padding:6px 0 var(--safe-b);z-index:10}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;padding:4px 0;color:var(--sec);font-size:10px;transition:color .2s}
.tab.active{color:var(--blue)}
.tab svg{width:24px;height:24px;margin-bottom:2px}
.card{background:var(--card);border-radius:var(--radius);padding:16px;margin:8px 16px}
.date-strip{display:flex;overflow-x:auto;padding:8px 12px;gap:6px;scroll-snap-type:x proximity;-webkit-overflow-scrolling:touch}
.date-strip::-webkit-scrollbar{display:none}
.date-chip{flex:0 0 auto;width:50px;height:62px;border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:12px;color:var(--sec);background:var(--card);scroll-snap-align:center;transition:all .2s;box-shadow:0 1px 2px #00000008}
.date-chip.today{border:2px solid var(--blue)}
.date-chip.active{background:var(--blue);color:#fff;font-weight:600;box-shadow:0 2px 8px #007AFF40}
.date-chip .dow{font-size:11px}
.date-chip .day{font-size:17px;font-weight:500;margin-top:2px}
.lesson-card{background:var(--card);border-radius:var(--radius);margin:8px 16px;overflow:hidden}
.lesson-card .inner{padding:14px 16px;display:flex;gap:12px}
.lesson-card .time-col{width:52px;text-align:center;flex-shrink:0}
.lesson-card .time-col .t1{font-weight:600;font-size:15px}
.lesson-card .time-col .t2{font-size:11px;color:var(--sec)}
.lesson-card .info-col{flex:1;min-width:0}
.lesson-card .info-col .nm{font-weight:600;font-size:16px}
.lesson-card .info-col .loc{font-size:13px;color:var(--sec);margin-top:2px}
.lesson-card .fee-col{text-align:right;flex-shrink:0}
.lesson-card .fee-col .fee{font-weight:600;font-size:15px;color:var(--sec)}
.badge{display:inline-block;font-size:11px;padding:2px 8px;border-radius:10px;font-weight:500}
.badge.scheduled{background:#007AFF18;color:var(--blue)}
.badge.completed{background:#34C75918;color:var(--green)}
.badge.leave{background:#FF950018;color:var(--orange)}
.badge.cancelled{background:#8e8e9318;color:var(--sec)}
.badge.adjusted{background:#FF950018;color:var(--orange);margin-left:4px}
.commute-bar{font-size:11px;padding:6px 12px;margin:0 12px;display:flex;align-items:center;gap:4px;border-radius:6px}
.commute-bar.error{background:#FF3B3010;color:var(--red)}
.commute-bar.info{background:#FF950010;color:var(--orange)}
.commute-bar.ok{background:#34C75910;color:var(--green)}
.week-grid{display:grid;grid-template-columns:40px repeat(7,1fr);gap:1px;background:var(--sep);font-size:11px;margin:0 8px}
.week-grid .cell{background:var(--card);min-height:30px;padding:2px}
.week-grid .cell.hd{text-align:center;font-weight:600;padding:6px 2px;font-size:11px}
.week-grid .cell.tm{text-align:right;color:var(--sec);padding:2px 3px;font-size:10px}
.week-grid .cell.busy{background:#007AFF10;border-left:2px solid var(--blue);font-size:10px;padding:2px 3px;overflow:hidden}
.week-grid .cell.today-col{background:var(--blue);color:#fff}
.student-row{display:flex;align-items:center;padding:14px 16px;gap:12px;border-bottom:1px solid var(--sep);cursor:pointer}
.student-row:active{background:#00000005}
.student-row .av{width:40px;height:40px;border-radius:20px;background:var(--blue);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:16px;flex-shrink:0}
.student-row .info{flex:1;min-width:0}
.student-row .info .nm{font-weight:500;font-size:15px}
.student-row .info .sub{font-size:13px;color:var(--sec);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sheet-overlay{position:fixed;inset:0;background:#00000040;z-index:100;display:flex;align-items:flex-end;animation:fadeIn .2s}
.sheet{background:var(--bg);width:100%;max-height:90vh;border-radius:16px 16px 0 0;overflow:hidden;display:flex;flex-direction:column;animation:slideUp .25s}
.sheet-header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;background:var(--card);border-bottom:1px solid var(--sep);flex-shrink:0}
.sheet-header h2{font-size:17px;font-weight:600}
.sheet-body{flex:1;overflow-y:auto;padding:16px;-webkit-overflow-scrolling:touch}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.btn{padding:10px 20px;border-radius:8px;font-weight:500;text-align:center;display:inline-block;font-size:15px}
.btn-primary{background:var(--blue);color:#fff}
.btn-danger{background:var(--red);color:#fff}
.btn-ghost{color:var(--blue)}
.btn-sm{font-size:13px;padding:6px 12px}
.btn-block{display:block;width:100%}
.btn-group{display:flex;gap:8px}
.btn-group>*{flex:1}
.form-sect{margin-bottom:20px}
.form-sect h3{font-size:15px;font-weight:600;margin-bottom:10px}
.form-row{display:flex;gap:8px;align-items:center}
.form-row>*{flex:1}
.form-row.fixed>*{flex:none}
.summary-cards{display:flex;gap:12px;padding:0 16px;margin:12px 0}
.summary-card{flex:1;background:var(--card);border-radius:var(--radius);padding:14px}
.summary-card .t{font-size:12px;color:var(--sec)}
.summary-card .v{font-size:24px;font-weight:700;margin-top:4px}
.summary-card .v.blue{color:var(--blue)}
.summary-card .v.green{color:var(--green)}
.toast{position:fixed;top:60px;left:50%;transform:translateX(-50%);background:#1c1c1e;color:#fff;padding:10px 20px;border-radius:20px;font-size:14px;z-index:200;animation:toastIn .3s;pointer-events:none}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(-10px)}}
.segmented{display:flex;background:var(--sep);border-radius:8px;padding:2px}
.segmented button{flex:1;padding:6px 12px;border-radius:6px;font-size:13px;color:var(--text);font-weight:500}
.segmented button.active{background:var(--card);box-shadow:0 1px 3px #00000010}
.empty{text-align:center;padding:40px 20px;color:var(--sec)}
.empty .title{font-size:16px;font-weight:600;margin-bottom:4px;color:var(--text)}
.empty .sub{font-size:14px}
.sch-chip{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;background:#007AFF10;color:var(--blue);border-radius:12px;font-size:12px;margin:2px 4px 2px 0}
.commute-auto{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--green);margin-top:4px}
.form-hint{font-size:12px;color:var(--sec);margin-top:4px;line-height:1.5}
.filter-pill{padding:5px 12px;border-radius:14px;font-size:13px;background:var(--card);color:var(--sec);border:1px solid transparent;white-space:nowrap;cursor:pointer}
.filter-pill.active{background:#007AFF12;color:var(--blue);border-color:var(--blue)}
.filter-row{display:flex;overflow-x:auto;padding:4px 16px 8px;gap:6px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.filter-row::-webkit-scrollbar{display:none}
</style>
</head>
<body>
<div id="app"><div id="main"></div><div id="tabbar"></div></div>
<div id="sheet-container"></div>
<div id="toast-container"></div>
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
<script>
// ==================== DATA STORE ====================
const Store=(()=>{
  let mem={},useMem=false;
  try{localStorage.setItem('_test','1');localStorage.removeItem('_test')}catch(e){useMem=true}
  return {
  get(k){try{if(useMem)return mem[k]||null;return JSON.parse(localStorage.getItem('ts_'+k))}catch(e){return mem[k]||null}},
  set(k,v){mem[k]=v;try{if(!useMem)localStorage.setItem('ts_'+k,JSON.stringify(v))}catch(e){useMem=true}},
  uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,8)},
  campuses(){return this.get('campuses')||[]},
  saveCampuses(v){this.set('campuses',v)},
  students(){return this.get('students')||[]},
  saveStudents(v){this.set('students',v)},
  lessons(){return this.get('lessons')||[]},
  saveLessons(v){this.set('lessons',v)},
  // Course type defaults
  courseTypes(){return this.get('courseTypes')||{private:100,institution:80,practice:75}},
  saveCourseTypes(v){this.set('courseTypes',v)},
  getCourseFee(type){const types=this.courseTypes();return types[type]||100;},
  // Map cache
  geocode(k){return this.get('geo_'+k)},
  setGeocode(k,v){this.set('geo_'+k,v)},
  route(k){return this.get('route_'+k)},
  setRoute(k,v){this.set('route_'+k,v)},
};})();

// ==================== HELPERS ====================
const fmt={
  time(h,m){return String(h).padStart(2,'0')+':'+String(m).padStart(2,'0')},
  date(d){const dd=new Date(d);return`${dd.getMonth()+1}/${dd.getDate()}`},
  weekday(d){return['日','一','二','三','四','五','六'][new Date(d).getDay()]},
  dateFull(d){return this.date(d)+' 周'+this.weekday(d)},
  month(d){const dd=new Date(d);return`${dd.getFullYear()}年${dd.getMonth()+1}月`},
};
const C={
  today(){const d=new Date();d.setHours(0,0,0,0);return d},
  addDays(d,n){const r=new Date(d);r.setDate(r.getDate()+n);return r},
  sameDay(a,b){return new Date(a).toDateString()===new Date(b).toDateString()},
  monday(d){const day=d.getDay();const diff=day===0?-6:1-day;const r=new Date(d);r.setDate(r.getDate()+diff);r.setHours(0,0,0,0);return r},
};

Date.prototype.toDateStr=function(){return`${this.getFullYear()}-${String(this.getMonth()+1).padStart(2,'0')}-${String(this.getDate()).padStart(2,'0')}`;};
const COURSE_TYPES={private:'家教课',institution:'机构课',practice:'陪练课'};
function courseTypeName(t){return COURSE_TYPES[t]||'家教课';}

// ==================== MAP / COMMUTE ====================
function openGaodeNav(loc,campusId){
  const c=Store.campuses().find(x=>x.id===campusId);
  const coords=c?.coords;
  if(coords){
    window.open(`https://uri.amap.com/navigation?to=${coords.lng},${coords.lat},${encodeURIComponent(c.name)}&mode=transit`,'_blank');
  }else{
    window.open(`https://uri.amap.com/search?keyword=${encodeURIComponent('深圳'+(c?.address||loc))}`,'_blank');
  }
}

const AMAP_KEY='0171acb32790d271c1b41464da33b47a';

async function geocodeAddr(addr){
  if(!addr) return null;
  const fullAddr=addr.includes('深圳')?addr:'深圳'+addr;
  let cached=Store.geocode(fullAddr);
  if(cached) return cached;
  // 高德地理编码
  try{
    const resp=await fetch(`https://restapi.amap.com/v3/geocode/geo?address=${encodeURIComponent(fullAddr)}&city=深圳&key=${AMAP_KEY}`);
    const data=await resp.json();
    if(data.status==='1'&&data.geocodes?.length){
      const [lng,lat]=data.geocodes[0].location.split(',').map(Number);
      const r={lat,lng};
      Store.setGeocode(fullAddr,r);
      return r;
    }
  }catch(e){}
  // 降级：OSM Nominatim
  try{
    const resp=await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(fullAddr)}&limit=1`);
    const data=await resp.json();
    if(data.length>0){
      const r={lat:parseFloat(data[0].lat),lng:parseFloat(data[0].lon)};
      Store.setGeocode(fullAddr,r);
      return r;
    }
  }catch(e){}
  return null;
}

// 公交路线规划（高德公交API + OSRM降级）
async function calcRoute(from,toAddr){
  if(!from||!toAddr||from===toAddr) return 0;
  const [f,t]=await Promise.all([geocodeAddr(from),geocodeAddr(toAddr)]);
  if(!f||!t) return 0;
  const cacheKey=`${from}|${toAddr}`;
  const cached=Store.route(cacheKey);
  if(cached!==null) return cached;
  // 高德公交路线规划
  try{
    const resp=await fetch(`https://restapi.amap.com/v3/direction/transit/integrated?origin=${f.lng},${f.lat}&destination=${t.lng},${t.lat}&city=深圳&key=${AMAP_KEY}`);
    const data=await resp.json();
    if(data.status==='1'&&data.route?.transits?.length){
      const mins=Math.round(data.route.transits[0].duration/60);
      Store.setRoute(cacheKey,mins);
      return mins;
    }
  }catch(e){}
  // 降级：OSRM driving × 1.1 估算
  try{
    const resp=await fetch(`https://router.project-osrm.org/route/v1/driving/${f.lng},${f.lat};${t.lng},${t.lat}?overview=false`);
    const data=await resp.json();
    if(data.routes?.length){
      const mins=Math.round(data.routes[0].duration/60*1.1);
      Store.setRoute(cacheKey,mins);
      return mins;
    }
  }catch(e){}
  return 0;
}

function addrFor(a){
  const c=Store.campuses().find(x=>x.id===a.campusId);
  const raw=c?.address||a.location||'';
  return raw&&!raw.includes('深圳')?'深圳'+raw:raw;
}

async function calcAllCommutes(lessons){
  const results={};
  for(let i=0;i<lessons.length-1;i++){
    const from=addrFor(lessons[i]),to=addrFor(lessons[i+1]);
    if(from&&to) results[i]=await calcRoute(from,to);
  }
  return results;
}

// ==================== LESSON GENERATION ====================
function generateLessons(){
  const today=C.today();
  const start=new Date(today.getFullYear(),today.getMonth(),1);
  const end=C.addDays(today,(Store.get('weeks')||4)*7);
  const students=Store.students().filter(s=>s.isActive!==false);
  const existing=Store.lessons();

  students.forEach(stu=>{
    if(!stu.schedules||!stu.schedules.length) return;
    stu.schedules.forEach(sch=>{
      let cur=new Date(Math.max(start.getTime(),today.getTime()));
      while(cur<=end){
	        if(cur.getDay()===sch.weekday){
	          if(sch.biweekly){const start=new Date(sch.biweeklyStart||cur);start.setHours(0,0,0,0);const weekNum=Math.floor((cur.getTime()-start.getTime())/(7*864e5));if(weekNum%2!==0){cur=C.addDays(cur,1);continue;}}
	          const ds=cur.toDateStr();
          const exists=existing.some(l=>
            l.studentId===stu.id&&l.date===ds
            &&l.startHour===sch.startHour&&(l.startMinute||0)===(sch.startMinute||0)
          );
          if(!exists){
            existing.push({
              id:Store.uid(),studentId:stu.id,date:ds,
              startHour:sch.startHour,startMinute:sch.startMinute||0,
              endHour:sch.endHour,endMinute:sch.endMinute||0,
              location:sch.location||stu.defaultLocation||'',
              plannedFee:sch.fee||stu.defaultFee||0,
              campusId:sch.campusId||stu.defaultCampusId||null,
              status:'scheduled',isAdjusted:false,notes:''
            });
          }
        }
        cur=C.addDays(cur,1);
      }
    });
  });
  // Remove lessons for deleted schedules that no longer match
  const cleaned=existing.filter(l=>{
    const stu=students.find(s=>s.id===l.studentId);
    if(!stu||!stu.schedules||!stu.schedules.length) return l.status!=='scheduled'||l.isAdjusted;
    const d=new Date(l.date);
    const wd=d.getDay();
    return stu.schedules.some(sch=>{if(sch.weekday!==wd||sch.startHour!==l.startHour||(sch.startMinute||0)!==(l.startMinute||0))return false;if(sch.biweekly){const start=new Date(sch.biweeklyStart||d);start.setHours(0,0,0,0);const wk=Math.floor((d.getTime()-start.getTime())/(7*864e5));return wk%2===0;}return true;})||l.status!=='scheduled'||l.isAdjusted;
  });
  Store.saveLessons(cleaned);
}

// ==================== SYNC STUDENT TO LESSONS ====================
function syncStudentToLessons(stu){
  const todayStr=C.today().toDateStr();
  const lessons=Store.lessons();
  let updated=0;
  lessons.forEach(l=>{
    if(l.studentId!==stu.id||l.status!=='scheduled'||l.date<todayStr) return;
    const newFee=stu.defaultFee||Store.getCourseFee(stu.courseType||'institution');
    if(l.plannedFee!==newFee){l.plannedFee=newFee;updated++;}
    // Match schedule: exact time first, fallback weekday-only (schedule time changed)
    const d=new Date(l.date);
    let sch=stu.schedules?.find(s=>s.weekday===d.getDay()
      &&s.startHour===l.startHour&&(s.startMinute||0)===(l.startMinute||0));
    if(!sch){const sameDay=stu.schedules?.filter(s=>s.weekday===d.getDay());if(sameDay?.length===1) sch=sameDay[0];}
    if(sch){
      const newLoc=sch.location||stu.defaultLocation||'';
      if(l.location!==newLoc){l.location=newLoc;updated++;}
      if(l.startHour!==sch.startHour||(l.startMinute||0)!==(sch.startMinute||0)
         ||l.endHour!==sch.endHour||(l.endMinute||0)!==(sch.endMinute||0)){
        l.startHour=sch.startHour;l.startMinute=sch.startMinute||0;
        l.endHour=sch.endHour;l.endMinute=sch.endMinute||0;
        updated++;
      }
    }
  });
  if(updated>0) Store.saveLessons(lessons);
  return updated;
}

// ==================== RENDER ENGINE ====================
let currentTab='today',selectedDate=C.today(),dayWeekMode='day';

const $=s=>document.querySelector(s),$$=s=>document.querySelectorAll(s);

function render(){
  generateLessons();
  const m=$('#main');
  switch(currentTab){
    case'today':m.innerHTML=renderToday();break;
    case'students':m.innerHTML=renderStudents();break;
    case'finance':m.innerHTML=renderFinance();break;
    case'settings':m.innerHTML=renderSettings();break;
  }
  renderTabbar();bindEvents();
  if(currentTab==='today'&&dayWeekMode==='day'&&selectedDate.toDateStr()>=C.today().toDateStr()) calcAndShowCommute();
}

function renderTabbar(){
  const tabs=[
    {id:'today',label:'今日',icon:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>'},
    {id:'students',label:'学生',icon:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M6 21v-2a4 4 0 014-4h4a4 4 0 014 4v2"/></svg>'},
    {id:'finance',label:'财务',icon:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="6" x2="12" y2="12"/><line x1="12" y1="12" x2="16" y2="14"/></svg>'},
    {id:'settings',label:'设置',icon:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2"/></svg>'},
  ];
  $('#tabbar').innerHTML=tabs.map(t=>
    `<div class="tab${currentTab===t.id?' active':''}" data-tab="${t.id}">${t.icon}<span>${t.label}</span></div>`
  ).join('');
}

// ==================== TODAY VIEW ====================
function renderToday(){
  const lessons=getDayLessons(selectedDate);
  const isPast=selectedDate.toDateStr()<C.today().toDateStr();
  let html='<div class="date-strip" id="date-strip">';
  for(let i=1-C.today().getDate();i<11;i++){
    const d=C.addDays(C.today(),i);
    const cls=['date-chip'];
    if(C.sameDay(d,C.today()))cls.push('today');
    if(C.sameDay(d,selectedDate))cls.push('active');
    html+=`<div class="${cls.join(' ')}" data-date="${d.toISOString()}"><span class="dow">${i===0?'今天':['日','一','二','三','四','五','六'][d.getDay()]}</span><span class="day">${d.getDate()}</span></div>`;
  }

function renderWeekView(){
  const ws=C.monday(selectedDate);
  const lessons=Store.lessons().filter(l=>l.status!=='cancelled'&&l.status!=='leave');
  let html=`<div style="display:flex;align-items:center;padding:8px 16px;gap:8px">
    <button class="btn btn-ghost btn-sm" id="btn-prev-week">‹</button>
    <span style="font-weight:600;font-size:14px">${fmt.date(ws)} - ${fmt.date(C.addDays(ws,6))}</span>
    <button class="btn btn-ghost btn-sm" id="btn-next-week">›</button>
    <span style="flex:1"></span>
    <button class="btn btn-sm btn-primary" id="btn-export">📷 导出</button>
  </div>`;

  html+='<div class="week-grid" id="week-grid">';
  html+='<div class="cell hd"></div>';
  const today=C.today();
  for(let d=0;d<7;d++){
    const date=C.addDays(ws,d);
    const isT=C.sameDay(date,today);
    html+=`<div class="cell hd${isT?' today-col':''}">${['一','二','三','四','五','六','日'][d]}<br>${date.getDate()}</div>`;
  }
  for(let h=6;h<23;h++){
    html+=`<div class="cell tm">${String(h).padStart(2,'0')}:00</div>`;
    for(let d=0;d<7;d++){
      const date=C.addDays(ws,d);
      const ds=date.toDateStr();
      const cell=lessons.filter(l=>l.date===ds&&l.startHour<=h&&l.endHour>h);
      const isT=C.sameDay(date,today);
      if(cell.length>0){
        const l=cell[0];const stu=Store.students().find(s=>s.id===l.studentId);
        html+=`<div class="cell busy${isT?' today-col':''}">${stu?.name||''}</div>`;
      }else{html+=`<div class="cell${isT?' today-col':''}"></div>`;}
    }
  }
  html+='</div>';
  return html;
}

let _commuteSeq=0;
async function calcAndShowCommute(){
  const seq=++_commuteSeq;  // guard against stale async results
  const all=getDayLessons(selectedDate);
  const lessons=all.filter(l=>l.status!=='leave');  // match renderToday activeLessons
  if(lessons.length===0) return;

  // Home → first scheduled lesson
  const homeBar=$('#home-commute-bar');
  const firstScheduled=lessons.find(l=>l.status==='scheduled');
  if(homeBar&&firstScheduled){
    const homeAddr=Store.get('homeAddr')||'深圳市光明区光明街道牛山路13号怡景一期';
    const toAddr=addrFor(firstScheduled);
    if(toAddr){
      const metroTime=await calcRoute(homeAddr,toAddr);
      if(seq!==_commuteSeq) return;
      const nowMin=new Date().getHours()*60+new Date().getMinutes();
      const startMin=firstScheduled.startHour*60+firstScheduled.startMinute;
      const available=startMin-nowMin;
      const urgent=metroTime>available;
      // Suggested departure time
      let depH=firstScheduled.startHour,depM=firstScheduled.startMinute-metroTime;
      while(depM<0){depM+=60;depH-=1;}
      homeBar.style.display='flex';
      if(metroTime>0){
        homeBar.className='commute-bar '+(urgent?'error':'ok');
        homeBar.innerHTML=`🏠 <b>从家出发</b> → ${firstScheduled.location||'上课地点'} 🚇约${metroTime}min · 建议${fmt.time(depH,depM)}出发 · 现在${fmt.time(new Date().getHours(),new Date().getMinutes())} · ${urgent?'⚠️ 来不及！':'来得及'} <button class="btn btn-sm" style="color:var(--blue);margin-left:auto;white-space:nowrap" id="home-nav-btn">🧭 导航</button>`;
      }else{
        homeBar.className='commute-bar info';
        homeBar.innerHTML=`🏠 <b>从家出发</b> → ${firstScheduled.location||'上课地点'} · 未能计算地铁时间 · <button class="btn btn-sm" style="color:var(--blue);margin-left:auto;white-space:nowrap" id="home-nav-btn">🧭 导航</button>`;
      }
      const homeNav=$('#home-nav-btn');
      if(homeNav) homeNav.onclick=(e)=>{e.stopPropagation();openGaodeNav(firstScheduled.location,firstScheduled.campusId);};
    }
  }

  // Between-lesson commutes → bar below card i, commute from i to i+1
  if(lessons.length<2) return;
  const commutes=await calcAllCommutes(lessons);
  if(seq!==_commuteSeq) return;
  $$('[data-commute]').forEach(el=>{
    const i=parseInt(el.dataset.commute);
    const a=lessons[i],b=lessons[i+1];
    if(b.status!=='scheduled') return;
    const gap=(b.startHour*60+b.startMinute)-(a.endHour*60+a.endMinute);
    const metroNeed=commutes[i]||0;
    const cA=Store.campuses().find(x=>x.id===a.campusId);
    const cB=Store.campuses().find(x=>x.id===b.campusId);
    const locA=a.location||cA?.name||'?';
    const locB=b.location||cB?.name||'?';
    el.style.display='flex';
    let color='var(--green)',cls='commute-bar ok';
    let text='';
    if(!metroNeed){
      text=`📍 ${locA} → ${locB} · 间隔${gap}min`;
    }else if(metroNeed>gap){
      cls='commute-bar error';color='var(--red)';
      text=`🚇 ${locA} → ${locB} 约${metroNeed}min ≥ ${gap}min，来不及！`;
    }else if(gap-metroNeed<=10){
      cls='commute-bar info';
      let sugH=b.startHour,sugM=b.startMinute-metroNeed;
      if(sugM<0){sugM+=60;sugH-=1;}
      text=`🚇 ${locA} → ${locB} 约${metroNeed}min，仅剩${gap-metroNeed}min · 建议${fmt.time(sugH,sugM)}出发`;
    }else{
      text=`🚇 ${locA} → ${locB} 约${metroNeed}min · 间隔${gap}min · 余${gap-metroNeed}min`;
    }
    el.className=cls;
    el.textContent=text;
  });
}

        return`${sc.biweekly?'🔄':''}每${wd} ${fmt.time(sc.startHour,sc.startMinute)}-${fmt.time(sc.endHour,sc.endMinute)}`;

    let stuRows='';
    ents.forEach(([sid,d])=>{const stu=Store.students().find(s=>s.id===sid);
      stuRows+=`<div style="display:flex;align-items:center;padding:9px 0;border-bottom:1px solid var(--sep)"><span style="flex:1;font-weight:500">${stu?.name||'未知'}</span><span style="margin-right:12px;font-size:13px">${d.n}节</span><span style="font-weight:600;color:var(--green)">¥${d.t}</span></div>`;});
    stuRows+=`<div style="display:flex;justify-content:space-between;padding:8px 0 0;font-size:12px;color:var(--sec)"><span>人均 ${(done.length/ents.length).toFixed(1)} 节 · ¥${Math.round(income/ents.length)}</span></div>`;
    html+=`<div class="card" style="padding:12px 16px;cursor:pointer" onclick="const b=document.getElementById('fin-stu');const a=this.querySelector('.arr');b.style.display=b.style.display==='none'?'block':'none';a.textContent=b.style.display==='none'?'▶':'▼';"><div style="display:flex;align-items:center"><span class="arr" style="font-size:10px;margin-right:6px">▶</span><span style="font-weight:600;font-size:14px">按学生</span><span style="color:var(--sec);font-size:12px;margin-left:8px">${ents.length}人 · ¥${income}</span></div></div>
    <div id="fin-stu" style="display:none;padding:0 16px 8px">${stuRows}</div>`;
  }

  // === 本月明细（两级折叠） ===
  const sorted=done.sort((a,b)=>a.date.localeCompare(b.date));
  if(sorted.length){
    html+=`<div class="card" style="padding:12px 16px;cursor:pointer;margin-top:8px" onclick="const b=document.getElementById('fin-detail');const a=this.querySelector('.arr');b.style.display=b.style.display==='none'?'block':'none';a.textContent=b.style.display==='none'?'▶':'▼';"><div style="display:flex;align-items:center"><span class="arr" style="font-size:10px;margin-right:6px">▶</span><span style="font-weight:600;font-size:14px">本月明细</span><span style="color:var(--sec);font-size:12px;margin-left:8px">${done.length}节 · ¥${income}</span></div></div>`;
    html+='<div id="fin-detail" style="display:none;padding:0 16px 8px">';

    const weeks=new Map();
    sorted.forEach(l=>{
      const d=new Date(l.date);
      const mon=C.monday(d).toDateStr();
      if(!weeks.has(mon)) weeks.set(mon,[]);
      weeks.get(mon).push(l);
    });

    let wkIdx=0;
    weeks.forEach((wkLessons,monStr)=>{
      const wkId='fin-wk-'+wkIdx;
      const mon=new Date(monStr);
      const sun=C.addDays(mon,6);
      const wkTotal=wkLessons.reduce((s,l)=>s+getLessonIncome(l),0);

      html+=`<div style="padding:8px 0;border-bottom:1px solid var(--sep);cursor:pointer" onclick="const b=document.getElementById('${wkId}');const a=this.querySelector('.arr');b.style.display=b.style.display==='none'?'block':'none';a.textContent=b.style.display==='none'?'▶':'▼';"><div style="display:flex;align-items:center"><span class="arr" style="font-size:10px;margin-right:6px">▶</span><span style="font-weight:500;font-size:13px">${mon.getMonth()+1}/${mon.getDate()}-${sun.getMonth()+1}/${sun.getDate()}</span><span style="color:var(--sec);font-size:12px;margin-left:8px">${wkLessons.length}节 ¥${wkTotal}</span></div></div>`;

      html+=`<div id="${wkId}" style="display:none;padding-left:16px">`;
      wkLessons.forEach(l=>{
        const stu=Store.students().find(s=>s.id===l.studentId);
        html+=`<div style="display:flex;align-items:center;padding:6px 0;border-bottom:1px solid var(--sep);opacity:0.85">
          <div style="flex:1;min-width:0">
            <div style="font-weight:500;font-size:12px">${fmt.dateFull(l.date)} ${fmt.time(l.startHour,l.startMinute)}</div>
            <div style="font-size:11px;color:var(--sec);margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${stu?.name||''}${l.location?' · '+l.location:''}</div>
          </div>
          <span style="font-weight:600;color:var(--green);margin-left:8px;white-space:nowrap;font-size:13px">¥${l.plannedFee}</span>
        </div>`;
      });
      html+='</div>';
      wkIdx++;
    });

    html+=`<div style="display:flex;justify-content:space-between;padding:10px 0;font-weight:700;font-size:14px;border-top:2px solid var(--sep)"><span>合计 ${done.length} 节</span><span style="color:var(--green)">¥${income}</span></div>`;
    html+='</div>';
  }else{
    html+='<div class="card" style="text-align:center;color:var(--sec);padding:16px">本月暂无已完成课程</div>';
  }

  return html;
}

// ==================== IMPORT ====================
function showImport(){
  const body=`<div class="form-sect"><h3>粘贴你的备忘录课表文本</h3>
    <textarea id="import-text" rows="14" placeholder="直接粘贴你的备忘录课表，格式：
周一
糖果 16:30-17:15 星河丹提
周伽好 17:45-18:30 华富村

周三
糖果 16:30-17:15 星河丹提

支持：周X 标题行 / 名字 时间-时间 地点 / (备注)
自动识别：请假跳过、停课标记、地点自动提取"></textarea>
    <p class="form-hint">格式：<b>名字 开始-结束 地点 (备注)</b><br>已有学生<b>不会覆盖</b>课程类型和价格，只合并新的排课时间段</p>
  </div>`;
  showSheet('导入课表',body,overlay=>{
    const text=overlay.querySelector('#import-text').value.trim();
    if(!text){toast('请粘贴课表文本');return false;}
    const result=parseSchedule(text);
    if(result.students.length===0){toast('未能识别任何课程，请检查格式');return false;}
    // Merge into existing data (preserve user customizations)
    const existingStudents=Store.students();
    const existingLessons=Store.lessons();
    result.students.forEach(newStu=>{
      const exist=existingStudents.find(s=>s.name===newStu.name);
      if(exist){
        // Only add NEW schedules (keep existing ones)
        const oldSchs=exist.schedules||[];
        (newStu.schedules||[]).forEach(ns=>{
          const dup=oldSchs.find(s=>s.weekday===ns.weekday&&s.startHour===ns.startHour&&s.startMinute===ns.startMinute);
          if(dup){
            // Update existing schedule with new location if import has it
            if(ns.location) dup.location=ns.location;
          }else{
            oldSchs.push(ns);
          }
        });
        exist.schedules=oldSchs;
        // Restore notes from import if they have useful info (请假/停课/未定等)
        if(newStu.notes&&exist.notes!==newStu.notes&&/请假|停课|未定|两周一节/.test(newStu.notes)){
          exist.notes=(exist.notes?exist.notes+'；':'')+newStu.notes;
        }
        if(newStu.defaultLocation&&!exist.defaultLocation) exist.defaultLocation=newStu.defaultLocation;
        // NEVER overwrite: courseType, defaultFee, defaultCampusId, isActive
      }else{
        existingStudents.push(newStu);
      }
    });
    Store.saveStudents(existingStudents);
    // Update existing future lessons with locations from import
    const todayStr=C.today().toDateStr();
    existingLessons.forEach(l=>{
      if(l.date>=todayStr&&l.status==='scheduled'&&!l.location){
        const stu=existingStudents.find(s=>s.id===l.studentId);
        if(stu&&stu.schedules){
          const d=new Date(l.date);
          const sch=stu.schedules.find(s=>s.weekday===d.getDay()&&s.startHour===l.startHour&&s.startMinute===l.startMinute);
          if(sch&&sch.location) l.location=sch.location;
        }
      }
    });
    result.lessons.forEach(newL=>{
      const stu=existingStudents.find(s=>s.name===newL.studentName);
      if(!stu) return;
      const exists=existingLessons.some(l=>l.studentId===stu.id&&l.date===newL.date&&l.startHour===newL.startHour&&(l.startMinute||0)===(newL.startMinute||0)&&l.status!=='cancelled'&&l.status!=='leave');
      if(!exists){
        existingLessons.push({...newL,studentId:stu.id});
      }
    });
    Store.saveLessons(existingLessons);
    generateLessons();
    toast(`导入成功：${result.students.length}个学生，${result.lessons.length}节课`);
    return true;
  });
}

function parseSchedule(text){
  const students=[],lessons=[];
  let currentWeekday=-1;
  const lines=text.split('\n');
  const wdMap={'一':1,'二':2,'三':3,'四':4,'五':5,'六':6,'日':0,'天':0};

  lines.forEach(line=>{
    line=line.trim();
    if(!line) return;
    // Match weekday header: 📅 周一, 周一, 📅 Monday etc
    const wdMatch=line.match(/周\s*([一二三四五六日天])/);
    if(wdMatch){currentWeekday=wdMap[wdMatch[1]];return;}
    if(currentWeekday<0) return;

    // Skip non-lesson lines
    if(/休息|放假/.test(line)) return;

    // Match: 黎峻睿 17:00-18:00 or ▫️ 黎峻睿 17:00-18:00 or - 黎峻睿 17:00-18:00
    const content=line.replace(/^[▫️▪•\-\s]+|^\d+[\.、]\s*/,'');
    const timeMatch=content.match(/(.+?)\s+(\d{1,2}):(\d{2})\s*[-–—~至]\s*(\d{1,2}):(\d{2})(.*)/);
    if(!timeMatch) return;

    const name=timeMatch[1].trim();
    const sh=parseInt(timeMatch[2]),sm=parseInt(timeMatch[3]);
    const eh=parseInt(timeMatch[4]),em=parseInt(timeMatch[5]);
    const extra=timeMatch[6].trim();

    // Parse: "地点 (备注)" or "地点" or "地点(备注)"
    let location='',note='';
    const noteIdx=extra.search(/[\(（]/);
    if(noteIdx>0){
      location=extra.substring(0,noteIdx).trim();
      note=extra.substring(noteIdx).replace(/^[\(（]|[\)）]$/g,'').trim();
    }else if(noteIdx===0){
      note=extra.replace(/^[\(（]|[\)）]$/g,'').trim();
    }else{
      location=extra;
    }

    // Check for 暂时停课 / 停课 → mark student inactive
    const isSuspended=/停课/.test(note);
    const isLeave=/请假/.test(note);
    const isUncertain=/未定/.test(note);

    // Create student
    const existingStu=students.find(s=>s.name===name);
    if(!existingStu){
      students.push({
        id:Store.uid(),name,parentContact:'',courseType:'institution',defaultLocation:location,defaultFee:80,
        defaultCampusId:null,isActive:!isSuspended,notes:note,
        schedules:isSuspended?[]:[{weekday:currentWeekday,startHour:sh,startMinute:sm,endHour:eh,endMinute:em,location,fee:80,campusId:null}]
      });
    }else{
      if(!existingStu.schedules) existingStu.schedules=[];
      // Update location if new one is more specific
      if(location&&(!existingStu.defaultLocation||existingStu.defaultLocation.length<location.length)){
        existingStu.defaultLocation=location;
      }
      // Update notes
      if(note&&!existingStu.notes) existingStu.notes=note;
      if(isSuspended) existingStu.isActive=false;
      // Add schedule for non-suspended lessons
      if(!isSuspended){
        const dup=existingStu.schedules.find(sc=>sc.weekday===currentWeekday&&sc.startHour===sh&&sc.startMinute===sm&&sc.endHour===eh&&sc.endMinute===em);
        if(!dup){
          existingStu.schedules.push({weekday:currentWeekday,startHour:sh,startMinute:sm,endHour:eh,endMinute:em,location,fee:80,campusId:null});
        }
      }
    }

    // Create lesson for next occurrence (skip for suspended/leave/uncertain)
    if(!isSuspended&&!isUncertain&&!isLeave){
      const today=C.today();
      const targetDate=new Date(today);
      const currentDay=targetDate.getDay();
      let daysUntil=currentWeekday-currentDay;
      if(daysUntil<0) daysUntil+=7;
      if(daysUntil===0&&new Date().getHours()>eh) daysUntil=7;
      targetDate.setDate(targetDate.getDate()+daysUntil);
      lessons.push({studentName:name,id:Store.uid(),date:targetDate.toDateStr(),startHour:sh,startMinute:sm,endHour:eh,endMinute:em,location,plannedFee:80,campusId:null,status:'scheduled',isAdjusted:false,notes:note||''});
    }
  });

  return {students,lessons};
}

// ==================== MONTHLY RECONCILIATION ====================
function showMonthDoneSheet(){
  const now=new Date();
  const ms=new Date(now.getFullYear(),now.getMonth(),1).toDateStr();
  const me=new Date(now.getFullYear(),now.getMonth()+1,1).toDateStr();
  const done=Store.lessons()
    .filter(l=>l.date>=ms&&l.date<me&&l.status==='completed')
    .sort((a,b)=>a.date.localeCompare(b.date)||((a.startHour*60+a.startMinute)-(b.startHour*60+b.startMinute)));
  const total=done.reduce((s,l)=>s+(getLessonIncome(l)),0);
  let rows=done.map(l=>{
    const stu=Store.students().find(s=>s.id===l.studentId);
    return `<div class="student-row" data-lesson="${l.id}" style="cursor:pointer">
      <div style="flex:1">
        <div style="font-weight:500">${fmt.dateFull(l.date)} ${fmt.time(l.startHour,l.startMinute)}</div>
        <div style="font-size:13px;color:var(--sec)">${stu?.name||''} ${l.location?'· '+l.location:''}</div>
      </div>
      <span style="font-weight:600;color:var(--green)">¥${l.plannedFee}</span>
    </div>`;
  }).join('');
  if(!done.length) rows=`<p style="text-align:center;color:var(--sec);padding:24px">本月暂无已完成课程</p>`;
  const body=`<div style="padding:0 16px 8px">
    ${rows}
    ${done.length?`<div style="display:flex;justify-content:space-between;padding:12px 0;border-top:2px solid var(--sep);font-weight:700;font-size:16px"><span>合计 ${done.length} 节</span><span style="color:var(--green)">¥${total}</span></div>`:''}
  </div>`;
  showSheet(`${now.getMonth()+1}月已上课程`,body,null);
  setTimeout(()=>{
    const sh=document.querySelector('#sheet-container .sheet-overlay:last-child');
    if(!sh) return;
    sh.querySelectorAll('[data-lesson]').forEach(el=>{
      el.onclick=()=>{const l=Store.lessons().find(x=>x.id===el.dataset.lesson);if(l)showLessonEdit(l);};
    });
  },100);
}

// ==================== SHEETS ====================
function showSheet(title,bodyHtml,onSave){
  const overlay=document.createElement('div');overlay.className='sheet-overlay';
  overlay.innerHTML=`<div class="sheet"><div class="sheet-header"><button class="btn-ghost" id="sheet-cancel">取消</button><h2>${title}</h2><button class="btn-ghost" style="font-weight:600" id="sheet-save">${onSave?'保存':'关闭'}</button></div><div class="sheet-body">${bodyHtml}</div></div>`;
  $('#sheet-container').appendChild(overlay);
  overlay.querySelector('#sheet-cancel').onclick=()=>closeSheet(overlay);
  overlay.querySelector('#sheet-save').onclick=()=>{if(onSave){if(onSave(overlay)===false)return;}closeSheet(overlay);};
  overlay.onclick=e=>{if(e.target===overlay)closeSheet(overlay);};
}

  },100);
}

    if(!q){row.style.display='';return;}
    row.style.display=(row.textContent||'').toLowerCase().includes(q)?'':'none';

function getLessonIncome(l){const stu=Store.students().find(s=>s.id===l.studentId);return(l.plannedFee||0)*(stu?.feeMultiplier||1);}

// ==================== UTILS ====================
function getDayLessons(date){const ds=date.toDateStr();return Store.lessons().filter(l=>l.date===ds&&l.status!=="cancelled").sort((a,b)=>(a.startHour*60+a.startMinute)-(b.startHour*60+b.startMinute));}
function dateTitle(d){const today=C.today();if(C.sameDay(d,today))return'今天';if(C.sameDay(d,C.addDays(today,-1)))return'昨天';if(C.sameDay(d,C.addDays(today,1)))return'明天';return`${d.getMonth()+1}月${d.getDate()}日 周${fmt.weekday(d)}`;}
function toast(msg){const el=document.createElement('div');el.className='toast';el.textContent=msg;$('#toast-container').appendChild(el);setTimeout(()=>{el.style.opacity='0';setTimeout(()=>el.remove(),300);},2000);}
async function exportWeekImage(){const grid=$('#week-grid');if(!grid)return toast('请先切换到周视图');try{const canvas=await html2canvas(grid,{backgroundColor:'#ffffff',scale:2});const blob=await new Promise(r=>canvas.toBlob(r,'image/png'));if(navigator.share){const file=new File([blob],`课表_${fmt.date(C.monday(selectedDate))}.png`,{type:'image/png'});await navigator.share({files:[file],title:'周课表'});}else{const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`课表_${fmt.date(C.monday(selectedDate))}.png`;a.click();}toast('导出成功 ✓');}catch(e){toast('导出失败');}}
