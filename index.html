<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#f2f2f7">
<title>家教排课</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect width='180' height='180' rx='40' fill='%23007AFF'/><text x='90' y='110' text-anchor='middle' font-size='80' fill='white'>📚</text></svg>">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --blue:#007AFF;--red:#FF3B30;--orange:#FF9500;--green:#34C759;
  --bg:#f2f2f7;--card:#fff;--text:#1c1c1e;--sec:#8e8e93;--sep:#e5e5ea;
  --radius:12px;--safe-b:env(safe-area-inset-bottom,0px);
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);-webkit-tap-highlight-color:transparent;overflow:hidden;height:100vh;user-select:none}
button{font:inherit;border:none;background:none;cursor:pointer;color:var(--blue)}
input,select,textarea{font:inherit;border:1px solid var(--sep);border-radius:8px;padding:10px 12px;width:100%;background:var(--card);outline:none}
input:focus,select:focus,textarea:focus{border-color:var(--blue)}
input[type="number"]{-moz-appearance:textfield}
label{font-size:13px;color:var(--sec);display:block;margin-bottom:4px}

/* App Shell */
#app{display:flex;flex-direction:column;height:100vh}
#main{flex:1;overflow-y:auto;padding-bottom:8px}
#tabbar{display:flex;background:var(--card);border-top:1px solid var(--sep);padding:6px 0 var(--safe-b);z-index:10}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;padding:4px 0;color:var(--sec);font-size:10px;transition:color .2s}
.tab.active{color:var(--blue)}
.tab svg{width:24px;height:24px;margin-bottom:2px}
.tab.active svg{fill:var(--blue)}

/* Cards */
.card{background:var(--card);border-radius:var(--radius);padding:16px;margin:8px 16px}
.card-row{display:flex;align-items:center;gap:12px}

/* Date Picker */
.date-strip{display:flex;overflow-x:auto;padding:8px 12px;gap:6px;scroll-snap-type:x proximity;-webkit-overflow-scrolling:touch}
.date-strip::-webkit-scrollbar{display:none}
.date-chip{flex:0 0 auto;width:48px;height:60px;border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:12px;color:var(--sec);background:var(--card);scroll-snap-align:center;transition:all .2s}
.date-chip.today{border:1.5px solid var(--blue)}
.date-chip.active{background:var(--blue);color:#fff;font-weight:600}
.date-chip .dow{font-size:11px}
.date-chip .day{font-size:16px;font-weight:500;margin-top:2px}

/* Lesson Card */
.lesson-card{background:var(--card);border-radius:var(--radius);margin:8px 16px;overflow:hidden;position:relative}
.lesson-card .inner{padding:14px 16px;display:flex;gap:12px;transition:transform .25s}
.lesson-card .time-col{width:52px;text-align:center;flex-shrink:0}
.lesson-card .time-col .t1{font-weight:600;font-size:15px}
.lesson-card .time-col .t2{font-size:11px;color:var(--sec)}
.lesson-card .info-col{flex:1;min-width:0}
.lesson-card .info-col .name{font-weight:600;font-size:16px}
.lesson-card .info-col .loc{font-size:13px;color:var(--sec);margin-top:2px}
.lesson-card .info-col .loc svg{width:12px;height:12px;vertical-align:-1px}
.lesson-card .fee-col{text-align:right;flex-shrink:0}
.lesson-card .fee-col .fee{font-weight:600;font-size:15px;color:var(--sec)}
.lesson-card .status-badge{display:inline-block;font-size:11px;padding:2px 8px;border-radius:10px;font-weight:500}
.lesson-card .status-badge.scheduled{background:#007AFF18;color:var(--blue)}
.lesson-card .status-badge.completed{background:#34C75918;color:var(--green)}
.lesson-card .status-badge.cancelled{background:#8e8e9318;color:var(--sec)}

/* Commute warning */
.commute-warn{font-size:11px;padding:6px 12px;margin:0 12px;display:flex;align-items:center;gap:4px;border-radius:6px}
.commute-warn.error{background:#FF3B3010;color:var(--red)}
.commute-warn.info{background:#FF950010;color:var(--orange)}

/* Week Grid */
.week-grid{display:grid;grid-template-columns:40px repeat(7,1fr);gap:1px;background:var(--sep);font-size:11px}
.week-grid .cell{background:var(--card);padding:3px;min-height:32px}
.week-grid .cell.header{text-align:center;font-weight:600;padding:6px 2px}
.week-grid .cell.time{text-align:right;color:var(--sec);padding:3px 4px;font-size:10px}
.week-grid .cell.has-lesson{background:#007AFF12;border-left:2px solid var(--blue);font-size:10px;padding:3px 4px}
.week-grid .cell.today-col{background:#007AFF06}

/* Student Row */
.student-row{display:flex;align-items:center;padding:14px 16px;gap:12px;border-bottom:1px solid var(--sep);cursor:pointer}
.student-row:active{background:#00000005}
.student-row .avatar{width:40px;height:40px;border-radius:20px;background:var(--blue);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:16px;flex-shrink:0}
.student-row .info{flex:1;min-width:0}
.student-row .info .name{font-weight:500}
.student-row .info .sub{font-size:13px;color:var(--sec);margin-top:2px}

/* Sheet / Modal */
.sheet-overlay{position:fixed;inset:0;background:#00000040;z-index:100;display:flex;align-items:flex-end;animation:fadeIn .2s}
.sheet{background:var(--bg);width:100%;max-height:90vh;border-radius:16px 16px 0 0;overflow:hidden;display:flex;flex-direction:column;animation:slideUp .25s}
.sheet-header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;background:var(--card);border-bottom:1px solid var(--sep);flex-shrink:0}
.sheet-header h2{font-size:17px;font-weight:600}
.sheet-body{flex:1;overflow-y:auto;padding:16px;-webkit-overflow-scrolling:touch}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}

/* Swipe action */
.swipe-container{overflow:hidden}
.swipe-actions{display:flex;position:absolute;right:0;top:0;bottom:0}
.swipe-actions button{width:64px;color:#fff;font-size:13px;font-weight:600;border:none}

/* Buttons */
.btn{padding:10px 20px;border-radius:8px;font-weight:500;text-align:center;display:inline-block}
.btn-primary{background:var(--blue);color:#fff}
.btn-danger{background:var(--red);color:#fff}
.btn-ghost{color:var(--blue)}
.btn-sm{font-size:13px;padding:6px 12px}
.btn-block{display:block;width:100%}
.btn-group{display:flex;gap:8px}

/* Form */
.form-section{margin-bottom:20px}
.form-section h3{font-size:15px;font-weight:600;margin-bottom:10px;color:var(--text)}
.form-row{display:flex;gap:8px;align-items:center}
.form-row>*{flex:1}
.form-hint{font-size:12px;color:var(--sec);margin-top:4px}

/* Summary Cards */
.summary-cards{display:flex;gap:12px;padding:0 16px;margin:12px 0}
.summary-card{flex:1;background:var(--card);border-radius:var(--radius);padding:14px}
.summary-card .sc-title{font-size:12px;color:var(--sec)}
.summary-card .sc-value{font-size:24px;font-weight:700;margin-top:4px}
.summary-card .sc-value.blue{color:var(--blue)}
.summary-card .sc-value.green{color:var(--green)}

/* Toast */
.toast{position:fixed;top:60px;left:50%;transform:translateX(-50%);background:#1c1c1e;color:#fff;padding:10px 20px;border-radius:20px;font-size:14px;z-index:200;animation:toastIn .3s;pointer-events:none}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(-10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

/* Segmented Control */
.segmented{display:flex;background:var(--sep);border-radius:8px;padding:2px}
.segmented button{flex:1;padding:6px 12px;border-radius:6px;font-size:13px;color:var(--text);font-weight:500}
.segmented button.active{background:var(--card);box-shadow:0 1px 3px #00000010}

/* Toggle */
.toggle{width:51px;height:31px;border-radius:16px;background:var(--sep);position:relative;transition:background .2s}
.toggle.on{background:var(--green)}
.toggle::after{content:'';width:27px;height:27px;border-radius:14px;background:#fff;position:absolute;top:2px;left:2px;transition:left .2s;box-shadow:0 1px 3px #00000020}
.toggle.on::after{left:22px}

/* Empty state */
.empty{text-align:center;padding:40px 20px;color:var(--sec)}
.empty svg{width:48px;height:48px;margin-bottom:16px;opacity:.5}
.empty .title{font-size:16px;font-weight:600;margin-bottom:4px;color:var(--text)}
.empty .sub{font-size:14px}

/* Filter pills */
.filter-row{display:flex;gap:6px;padding:8px 16px;flex-wrap:wrap}
.filter-pill{padding:5px 12px;border-radius:14px;font-size:13px;background:var(--card);color:var(--sec);border:1px solid transparent}
.filter-pill.active{background:#007AFF12;color:var(--blue);border-color:var(--blue)}
</style>
</head>
<body>
<div id="app">
  <div id="main"></div>
  <div id="tabbar"></div>
</div>
<div id="sheet-container"></div>
<div id="toast-container"></div>
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
<script>
// ==================== DATA STORE ====================
const Store = {
  get(k) { try { return JSON.parse(localStorage.getItem('ts_'+k)) } catch { return null } },
  set(k,v) { localStorage.setItem('ts_'+k, JSON.stringify(v)) },
  uid() { return Date.now().toString(36)+Math.random().toString(36).slice(2,8) },

  campuses() { return this.get('campuses')||[] },
  saveCampuses(v) { this.set('campuses',v) },

  students() { return this.get('students')||[] },
  saveStudents(v) { this.set('students',v) },

  lessons() { return this.get('lessons')||[] },
  saveLessons(v) { this.set('lessons',v) },

  weeksAhead() { return this.get('weeks')||4 },
  saveWeeksAhead(v) { this.set('weeks',v) },
};

// ==================== HELPERS ====================
const fmt = {
  time(h,m) { return String(h).padStart(2,'0')+':'+String(m).padStart(2,'0') },
  date(d) { const dd=new Date(d); return `${dd.getMonth()+1}/${dd.getDate()}` },
  weekday(d) { return ['日','一','二','三','四','五','六'][new Date(d).getDay()] },
  dateFull(d) { return this.date(d)+' 周'+this.weekday(d) },
  month(d) { const dd=new Date(d); return `${dd.getFullYear()}年${dd.getMonth()+1}月` },
};
const cal = {
  today() { const d=new Date(); d.setHours(0,0,0,0); return d },
  dayStart(d) { const r=new Date(d); r.setHours(0,0,0,0); return r },
  addDays(d,n) { const r=new Date(d); r.setDate(r.getDate()+n); return r },
  sameDay(a,b) { return new Date(a).toDateString()===new Date(b).toDateString() },
  weekday(d) { return new Date(d).getDay() }, // 0=Sun
  weekStart(d) { const r=new Date(d); r.setDate(r.getDate()-r.getDay()+1); r.setHours(0,0,0,0); return r }, // Mon start
};

// ==================== LESSON GENERATION ====================
function generateLessons() {
  const weeks = Store.weeksAhead();
  const today = cal.today();
  const end = cal.addDays(today, weeks*7);
  const students = Store.students().filter(s=>s.isActive!==false&&s.defaultWeekday!=null);
  const existing = Store.lessons();

  students.forEach(stu=>{
    const wd = stu.defaultWeekday;
    const sh = stu.defaultStartHour, sm = stu.defaultStartMinute||0;
    const eh = stu.defaultEndHour, em = stu.defaultEndMinute||0;
    if(wd==null||sh==null||eh==null) return;

    let cur = new Date(today);
    while(cur<=end){
      if(cur.getDay()===wd){
        const dateStr = cur.toISOString().split('T')[0];
        const exists = existing.some(l=>
          l.studentId===stu.id && l.date===dateStr && l.status!=='cancelled'
        );
        if(!exists){
          existing.push({
            id:Store.uid(), studentId:stu.id, date:dateStr,
            startHour:sh,startMinute:sm, endHour:eh,endMinute:em,
            location:stu.defaultLocation||'', plannedFee:stu.defaultFee||0,
            actualFee:null, status:'scheduled', isAdjusted:false, notes:''
          });
        }
      }
      cur=cal.addDays(cur,1);
    }
  });
  Store.saveLessons(existing);
}

// ==================== RENDER ENGINE ====================
let currentTab='today', selectedDate=cal.today(), dayWeekMode='day';

const $ = s=>document.querySelector(s);
const $$ = s=>document.querySelectorAll(s);

function render(){
  generateLessons();
  const m=$('#main');
  switch(currentTab){
    case 'today': m.innerHTML=renderToday(); break;
    case 'students': m.innerHTML=renderStudents(); break;
    case 'finance': m.innerHTML=renderFinance(); break;
    case 'settings': m.innerHTML=renderSettings(); break;
  }
  renderTabbar();
  bindEvents();
}

function renderTabbar(){
  const tabs=[
    {id:'today',label:'今日',icon:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/><circle cx="8" cy="15" r="1" fill="currentColor"/></svg>'},
    {id:'students',label:'学生',icon:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M6 21v-2a4 4 0 014-4h4a4 4 0 014 4v2"/></svg>'},
    {id:'finance',label:'财务',icon:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="6" x2="12" y2="12"/><line x1="12" y1="12" x2="16" y2="14"/></svg>'},
    {id:'settings',label:'设置',icon:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2"/></svg>'},
  ];
  $('#tabbar').innerHTML=tabs.map(t=>
    `<div class="tab${currentTab===t.id?' active':''}" data-tab="${t.id}">${t.icon}<span>${t.label}</span></div>`
  ).join('');
}

// ==================== TODAY VIEW ====================
function renderToday(){
  const lessons=getDayLessons(selectedDate);
  const cal2=cal;
  let html='<div class="date-strip" id="date-strip">';
  for(let i=-3;i<11;i++){
    const d=cal2.addDays(cal2.today(),i);
    const cls=['date-chip'];
    if(cal2.sameDay(d,cal2.today())) cls.push('today');
    if(cal2.sameDay(d,selectedDate)) cls.push('active');
    html+=`<div class="${cls.join(' ')}" data-date="${d.toISOString()}">
      <span class="dow">${i===0?'今天':['日','一','二','三','四','五','六'][d.getDay()]}</span>
      <span class="day">${d.getDate()}</span>
    </div>`;
  }
  html+='</div>';

  // Day/Week toggle
  html+=`<div style="display:flex;align-items:center;padding:8px 16px">
    <span style="font-weight:700;font-size:20px">${dateTitle(selectedDate)}</span>
    <span style="flex:1"></span>
    <div class="segmented">
      <button class="${dayWeekMode==='day'?'active':''}" data-mode="day">日</button>
      <button class="${dayWeekMode==='week'?'active':''}" data-mode="week">周</button>
    </div>
  </div>`;

  if(dayWeekMode==='week'){
    html+=renderWeekView();
  }else{
    if(lessons.length===0){
      html+=`<div class="empty"><div class="title">今日暂无课程</div><div class="sub">去「学生」页面添加排课</div></div>`;
    }else{
      lessons.forEach((l,i)=>{
        const student=Store.students().find(s=>s.id===l.studentId);
        const badgeCls=l.status==='completed'?'completed':l.status==='cancelled'?'cancelled':'scheduled';
        const badgeText=l.status==='completed'?'已完成':l.status==='cancelled'?'已取消':'待上课';
        html+=`<div class="lesson-card" data-lesson="${l.id}">
          <div class="inner">
            <div class="time-col"><div class="t1">${fmt.time(l.startHour,l.startMinute)}</div><div class="t2">${fmt.time(l.endHour,l.endMinute)}</div></div>
            <div class="info-col">
              <div class="name">${student?.name||'未知'} ${l.isAdjusted?'✏️':''}</div>
              ${l.location?`<div class="loc"><svg viewBox="0 0 24 24" fill="none" stroke="var(--sec)" stroke-width="2"><circle cx="12" cy="10" r="3"/><path d="M12 2a8 8 0 00-8 8c0 6 8 12 8 12s8-6 8-12a8 8 0 00-8-8z"/></svg> ${l.location}</div>`:''}
              <div style="margin-top:4px"><span class="status-badge ${badgeCls}">${badgeText}</span></div>
            </div>
            <div class="fee-col"><div class="fee">¥${l.actualFee!=null?l.actualFee:l.plannedFee}</div></div>
          </div>`;
        // Commute warning
        if(i<lessons.length-1){
          const next=lessons[i+1];
          const prevEndMin=l.endHour*60+l.endMinute;
          const nextStartMin=next.startHour*60+next.startMinute;
          const gap=nextStartMin-prevEndMin;
          const prevCampus=student?.campusId?Store.campuses().find(c=>c.id===student.campusId):null;
          const nextStudent=Store.students().find(s=>s.id===next.studentId);
          const nextCampus=nextStudent?.campusId?Store.campuses().find(c=>c.id===nextStudent.campusId):null;
          let commuteNeed=0;
          if(prevCampus&&nextCampus&&prevCampus.id!==nextCampus.id) commuteNeed=prevCampus.commuteMinutes||0;
          else if(prevCampus) commuteNeed=Math.floor((prevCampus.commuteMinutes||0)/2);

          if(commuteNeed>gap){
            html+=`<div class="commute-warn error">⚠️ 通勤不足！需${commuteNeed}分钟，仅剩${gap}分钟</div>`;
          }else if(commuteNeed>0&&gap<45){
            html+=`<div class="commute-warn info">ℹ️ 建议${fmt.time(next.startHour,next.startMinute-commuteNeed)}出发，${gap-commuteNeed}分钟余量</div>`;
          }
        }
        html+='</div>';
      });
    }
  }
  return html;
}

// ==================== WEEK VIEW ====================
function renderWeekView(){
  const ws=cal.weekStart(selectedDate);
  const lessons=Store.lessons().filter(l=>l.status!=='cancelled');
  let html=`<div style="display:flex;align-items:center;padding:8px 16px;gap:8px">
    <span style="font-weight:600;font-size:14px">${fmt.date(ws)} - ${fmt.date(cal.addDays(ws,6))}</span>
    <span style="flex:1"></span>
    <button class="btn btn-sm btn-primary" id="btn-export">📷 导出图片</button>
  </div>`;

  html+='<div class="week-grid" id="week-grid" style="margin:0 8px">';
  // Header row
  html+='<div class="cell header"></div>';
  const today=cal.today();
  for(let d=0;d<7;d++){
    const date=cal.addDays(ws,d);
    const isT=cal.sameDay(date,today);
    html+=`<div class="cell header${isT?' today-col':''}">${['一','二','三','四','五','六','日'][d]}<br>${date.getDate()}</div>`;
  }
  for(let h=6;h<23;h++){
    html+=`<div class="cell time">${String(h).padStart(2,'0')}:00</div>`;
    for(let d=0;d<7;d++){
      const date=cal.addDays(ws,d);
      const dateStr=date.toISOString().split('T')[0];
      const cellLessons=lessons.filter(l=>l.date===dateStr&&l.startHour<=h&&l.endHour>h);
      const isT=cal.sameDay(date,today);
      if(cellLessons.length>0){
        const l=cellLessons[0];
        const stu=Store.students().find(s=>s.id===l.studentId);
        html+=`<div class="cell has-lesson${isT?' today-col':''}">${stu?.name||''}<br>${l.location||''}</div>`;
      }else{
        html+=`<div class="cell${isT?' today-col':''}"></div>`;
      }
    }
  }
  html+='</div>';
  return html;
}

// ==================== STUDENTS VIEW ====================
function renderStudents(){
  const students=Store.students();
  const campuses=Store.campuses();
  let html=`<div style="padding:12px 16px;display:flex;gap:8px">
    <input type="search" placeholder="搜索学生..." id="search-students" style="flex:1">
    <button class="btn btn-primary" id="btn-add-student">+ 添加</button>
  </div>`;
  html+='<div class="filter-row" id="campus-filter">';
  html+=`<span class="filter-pill active" data-campus="">全部</span>`;
  campuses.forEach(c=>{ html+=`<span class="filter-pill" data-campus="${c.id}">${c.name}</span>`; });
  html+='</div>';

  const filter=()=>{
    const q=($('#search-students')?.value||'').toLowerCase();
    const cf=$('#campus-filter')?.querySelector('.active')?.dataset?.campus||'';
    return students.filter(s=>{
      if(!s.isActive&&s.isActive!==undefined) return false;
      if(q&&!s.name.toLowerCase().includes(q)) return false;
      if(cf&&s.campusId!==cf) return false;
      return true;
    });
  };

  const filtered=filter();
  if(filtered.length===0){
    html+=`<div class="empty"><div class="title">暂无学生</div><div class="sub">点击右上角添加第一个学生</div></div>`;
  }else{
    html+='<div style="margin-top:8px">';
    filtered.forEach(s=>{
      const campus=campuses.find(c=>c.id===s.campusId);
      html+=`<div class="student-row" data-student="${s.id}">
        <div class="avatar">${s.name[0]}</div>
        <div class="info">
          <div class="name">${s.name} <span style="font-size:12px;color:var(--sec)">${s.parentContact||''}</span></div>
          <div class="sub">${s.hasSchedule?scheduleDesc(s):'未设置排课'} · ¥${s.defaultFee||0}/节 · ${campus?campus.name:'无校区'}</div>
        </div>
        <span style="color:var(--sec)">›</span>
      </div>`;
    });
    html+='</div>';
  }
  return html;
}

function scheduleDesc(s){
  const wd=['日','一','二','三','四','五','六'][s.defaultWeekday];
  return `每${wd} ${fmt.time(s.defaultStartHour,s.defaultStartMinute)}-${fmt.time(s.defaultEndHour,s.defaultEndMinute)}`;
}

// ==================== FINANCE VIEW ====================
let financeMonth=new Date();
function renderFinance(){
  const ym=`${financeMonth.getFullYear()}-${String(financeMonth.getMonth()+1).padStart(2,'0')}`;
  const monthStart=`${ym}-01`;
  const nextMonth=new Date(financeMonth.getFullYear(),financeMonth.getMonth()+1,1).toISOString().split('T')[0];
  const allLessons=Store.lessons().filter(l=>l.date>=monthStart&&l.date<nextMonth);
  const completed=allLessons.filter(l=>l.status==='completed');
  const totalIncome=completed.reduce((s,l)=>s+(l.actualFee||l.plannedFee||0),0);

  let html=`<div style="display:flex;align-items:center;justify-content:center;padding:16px;gap:16px">
    <button id="btn-prev-month">‹</button>
    <span style="font-weight:700;font-size:18px">${fmt.month(financeMonth)}</span>
    <button id="btn-next-month">›</button>
  </div>

  <div class="summary-cards">
    <div class="summary-card"><div class="sc-title">总课时</div><div class="sc-value blue">${completed.length} 节</div></div>
    <div class="summary-card"><div class="sc-title">总收入</div><div class="sc-value green">¥${totalIncome}</div></div>
  </div>`;

  // By student
  const byStudent={};
  completed.forEach(l=>{
    const sid=l.studentId;
    if(!byStudent[sid]) byStudent[sid]={count:0,total:0};
    byStudent[sid].count++;
    byStudent[sid].total+=(l.actualFee||l.plannedFee||0);
  });

  html+='<div class="card"><h3 style="font-size:15px;font-weight:600;margin-bottom:12px">按学生统计</h3>';
  const students=Store.students();
  const entries=Object.entries(byStudent).sort((a,b)=>b[1].total-a[1].total);
  if(entries.length===0){
    html+='<p style="color:var(--sec);text-align:center;padding:12px">本月暂无已完成课程</p>';
  }else{
    entries.forEach(([sid,data])=>{
      const stu=students.find(s=>s.id===sid);
      html+=`<div style="display:flex;align-items:center;padding:10px 0;border-bottom:1px solid var(--sep)">
        <span style="flex:1">${stu?.name||'未知'}</span>
        <span style="margin-right:16px">${data.count} 节</span>
        <span style="font-weight:600;color:var(--green)">¥${data.total}</span>
      </div>`;
    });
  }
  html+='</div>';

  // All lessons this month
  html+='<div class="card" style="margin-top:12px"><h3 style="font-size:15px;font-weight:600;margin-bottom:12px">本月课程明细</h3>';
  const sorted=allLessons.sort((a,b)=>a.date.localeCompare(b.date));
  if(sorted.length===0){
    html+='<p style="color:var(--sec);text-align:center;padding:12px">本月暂无课程</p>';
  }else{
    sorted.forEach(l=>{
      const stu=students.find(s=>s.id===l.studentId);
      const badgeCls=l.status==='completed'?'completed':l.status==='cancelled'?'cancelled':'scheduled';
      const badgeText=l.status==='completed'?'已完成':l.status==='cancelled'?'已取消':'待上课';
      html+=`<div class="student-row" data-lesson="${l.id}">
        <div style="flex:1">
          <div style="font-weight:500">${fmt.date(l.date)} ${fmt.time(l.startHour,l.startMinute)}</div>
          <div style="font-size:13px;color:var(--sec)">${stu?.name||''} ${l.location||''}</div>
        </div>
        <span class="status-badge ${badgeCls}">${badgeText}</span>
        <span style="margin-left:8px;font-weight:600">¥${l.actualFee||l.plannedFee}</span>
      </div>`;
    });
  }
  html+='</div>';

  return html;
}

// ==================== SHEET MODALS ====================
function showSheet(title, bodyHtml, onSave){
  const overlay=document.createElement('div');
  overlay.className='sheet-overlay';
  overlay.innerHTML=`<div class="sheet">
    <div class="sheet-header">
      <button class="btn-ghost" id="sheet-cancel">取消</button>
      <h2>${title}</h2>
      <button class="btn-ghost" style="font-weight:600" id="sheet-save">${onSave?'保存':'关闭'}</button>
    </div>
    <div class="sheet-body">${bodyHtml}</div>
  </div>`;
  $('#sheet-container').appendChild(overlay);

  overlay.querySelector('#sheet-cancel').onclick=()=>closeSheet(overlay);
  overlay.querySelector('#sheet-save').onclick=()=>{
    if(onSave){
      const data=onSave(overlay);
      if(data===false) return; // validation failed
    }
    closeSheet(overlay);
  };
  overlay.onclick=e=>{ if(e.target===overlay) closeSheet(overlay); };
}

function closeSheet(overlay){
  overlay.style.opacity='0';
  setTimeout(()=>overlay.remove(),200);
  render();
}

// ==================== EVENT HANDLING ====================
function bindEvents(){
  // Tab switching
  $$('#tabbar .tab').forEach(el=>{
    el.onclick=()=>{ currentTab=el.dataset.tab; dayWeekMode='day'; render(); };
  });

  // Date chips
  $$('#date-strip .date-chip').forEach(el=>{
    el.onclick=()=>{ selectedDate=new Date(el.dataset.date); render(); };
  });

  // Day/Week toggle
  $$('.segmented button').forEach(el=>{
    el.onclick=()=>{ dayWeekMode=el.dataset.mode; render(); };
  });

  // Export image
  const exportBtn=$('#btn-export');
  if(exportBtn) exportBtn.onclick=exportWeekImage;

  // Student search
  const searchEl=$('#search-students');
  if(searchEl) searchEl.oninput=()=>render();

  // Campus filter
  $$('#campus-filter .filter-pill').forEach(el=>{
    el.onclick=()=>{
      $$('#campus-filter .filter-pill').forEach(x=>x.classList.remove('active'));
      el.classList.add('active');
      render();
    };
  });

  // Add student
  const addBtn=$('#btn-add-student');
  if(addBtn) addBtn.onclick=()=>showStudentEdit();

  // Student rows -> detail
  $$('.student-row[data-student]').forEach(el=>{
    el.onclick=()=>renderStudentDetail(el.dataset.student);
  });

  // Lesson rows -> edit
  $$('.student-row[data-lesson]').forEach(el=>{
    el.onclick=()=>{
      const l=Store.lessons().find(x=>x.id===el.dataset.lesson);
      if(l) showLessonEdit(l);
    };
  });

  // Lesson cards -> edit
  $$('.lesson-card').forEach(el=>{
    el.onclick=()=>{
      const l=Store.lessons().find(x=>x.id===el.dataset.lesson);
      if(l) showLessonEdit(l);
    };
  });

  // Long press lesson card -> mark completed
  $$('.lesson-card').forEach(el=>{
    let timer;
    el.addEventListener('touchstart',()=>{
      timer=setTimeout(()=>{
        const l=Store.lessons().find(x=>x.id===el.dataset.lesson);
        if(l&&l.status==='scheduled'){
          l.status='completed'; l.actualFee=l.plannedFee;
          Store.saveLessons(Store.lessons().map(x=>x.id===l.id?l:x));
          toast('已标记完成 ✓');
          render();
        }
      },600);
    });
    el.addEventListener('touchend',()=>clearTimeout(timer));
    el.addEventListener('touchmove',()=>clearTimeout(timer));
  });

  // Finance month nav
  const prevBtn=$('#btn-prev-month');
  if(prevBtn) prevBtn.onclick=()=>{ financeMonth.setMonth(financeMonth.getMonth()-1); render(); };
  const nextBtn=$('#btn-next-month');
  if(nextBtn) nextBtn.onclick=()=>{ financeMonth.setMonth(financeMonth.getMonth()+1); render(); };

  // Settings buttons
  const addCampus=$('#btn-add-campus');
  if(addCampus) addCampus.onclick=()=>showCampusEdit();

  $$('[data-edit-campus]').forEach(el=>{
    el.onclick=(e)=>{ e.stopPropagation(); const c=Store.campuses().find(x=>x.id===el.dataset.editCampus); if(c) showCampusEdit(c); };
  });
  $$('[data-delete-campus]').forEach(el=>{
    el.onclick=(e)=>{
      e.stopPropagation();
      if(confirm('删除该校区？关联学生的校区将清空。')){
        const campuses=Store.campuses().filter(x=>x.id!==el.dataset.deleteCampus);
        const students=Store.students().map(s=>s.campusId===el.dataset.deleteCampus?{...s,campusId:null}:s);
        Store.saveCampuses(campuses); Store.saveStudents(students); render();
      }
    };
  });

  const weeksUp=$('#btn-weeks-up');
  if(weeksUp) weeksUp.onclick=()=>{ Store.saveWeeksAhead(Math.min(12,Store.weeksAhead()+1)); generateLessons(); render(); };
  const weeksDown=$('#btn-weeks-down');
  if(weeksDown) weeksDown.onclick=()=>{ Store.saveWeeksAhead(Math.max(1,Store.weeksAhead()-1)); generateLessons(); render(); };

  const sampleBtn=$('#btn-sample-data');
  if(sampleBtn) sampleBtn.onclick=insertSampleData;
  const clearBtn=$('#btn-clear-data');
  if(clearBtn) clearBtn.onclick=()=>{ if(confirm('确认清除全部数据？此操作不可撤销！')){ localStorage.clear(); render(); } };
}

// ==================== UTILITIES ====================
function getDayLessons(date){
  const ds=date.toISOString().split('T')[0];
  return Store.lessons()
    .filter(l=>l.date===ds&&l.status!=='cancelled')
    .sort((a,b)=>(a.startHour*60+a.startMinute)-(b.startHour*60+b.startMinute));
}

function dateTitle(d){
  const today=cal.today();
  if(cal.sameDay(d,today)) return '今天';
  if(cal.sameDay(d,cal.addDays(today,-1))) return '昨天';
  if(cal.sameDay(d,cal.addDays(today,1))) return '明天';
  return `${d.getMonth()+1}月${d.getDate()}日 周${fmt.weekday(d)}`;
}

function toast(msg){
  const el=document.createElement('div');
  el.className='toast'; el.textContent=msg;
  $('#toast-container').appendChild(el);
  setTimeout(()=>{ el.style.opacity='0'; setTimeout(()=>el.remove(),300); },2000);
}

async function exportWeekImage(){
  const grid=$('#week-grid');
  if(!grid) return toast('请先切换到周视图');
  try{
    const canvas=await html2canvas(grid,{backgroundColor:'#ffffff',scale:2});
    const blob=await new Promise(r=>canvas.toBlob(r,'image/png'));
    const url=URL.createObjectURL(blob);

    // Try share API
    if(navigator.share){
      const file=new File([blob],`课表_${fmt.date(cal.weekStart(selectedDate))}.png`,{type:'image/png'});
      await navigator.share({files:[file],title:'周课表'});
    }else{
      // Fallback: download
      const a=document.createElement('a'); a.href=url; a.download=`课表_${fmt.date(cal.weekStart(selectedDate))}.png`; a.click();
    }
    toast('导出成功 ✓');
  }catch(e){ toast('导出失败'); console.error(e); }
}
